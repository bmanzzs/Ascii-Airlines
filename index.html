<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascii Airlines</title>
    <!--
    Code Table of Contents
    - index.html: HTML shell, CSS, canvas/HUD containers, and script load order.
    - js/sprites.js: ASCII art assets, sprite color helpers, and asset-adjacent factories.
    - js/void-content.js: Black Void / late-game void mechanics, attacks, and rendering.
    - js/waves.js: WaveManager, wave definitions, formation spawning, and fly-by scheduling.
    - js/bootstrap.js: Canvas, HUD, and FPS DOM references.
    - js/audio.js: Music, SFX buffers, volume, and boss track helpers.
    - js/render-config.js: Logical canvas sizing and shared render constants.
    - js/boss-defeat.js: Boss defeat freeze, explosion SFX, and reward handoff.
    - js/state.js: Theme, runtime state, pause helpers, and global physics constants.
    - js/player.js: Player model, weapons, upgrades, beams, and console command helpers.
    - js/entities-input.js: Entity arrays, input listeners, particles, and spatial hash state.
    - js/combat-systems.js: Explosions, projectiles, resize, reset, and utility systems.
    - js/physics.js: Main simulation update loop.
    - js/ui-render.js: Menus, overlays, title sequence, and canvas rendering.
    - js/hud.js: HUD DOM construction and incremental HUD updates.
    - js/main-loop.js: requestAnimationFrame loop and startup.
    -->
    <link rel="icon" type="image/png" href="icons/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
    <link rel="shortcut icon" href="icons/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Electrolize&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-color: #6aa8ff;
            --theme-bg: #050712;
            --theme-shadow: 0 0 5px #6aa8ff;
            --theme-fps: #a2b7d0;
            --hud-height: 48px;
            --hud-ui-scale: 1;
            --hud-weapon-cell: 12px;
        }
        body, html {
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', Courier, monospace;

        }
        canvas {
            display: block;
            border: 2px solid var(--theme-color);
            box-sizing: border-box;
            image-rendering: pixelated;
        }
        #game-container {
            position: relative;
            display: block;
        }
        #game-container:fullscreen {
            width: 100vw !important;
            height: 100vh !important;
            background: #000;
            overflow: hidden;
        }
        #hud {
            position: absolute;
            left: 0;
            bottom: 0;
            z-index: 3;
            width: 100%;
            min-width: 0;
            height: var(--hud-height);
            background: var(--theme-bg);
            border: 2px solid var(--theme-color);
            border-top: 1px solid currentColor;
            color: var(--theme-color);
            font-family: 'Electrolize', 'Courier New', sans-serif;
            font-size: calc(11px * var(--hud-ui-scale));
            font-weight: bold;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: calc(12px * var(--hud-ui-scale));
            padding: calc(2px * var(--hud-ui-scale)) calc(10px * var(--hud-ui-scale));
            box-sizing: border-box;
            text-shadow: var(--theme-shadow);
            box-shadow: inset 0 0 15px color-mix(in srgb, var(--theme-color) 20%, transparent);
            pointer-events: none;
            overflow: hidden;
        }
        #hud > * {
            min-width: 0;
        }
        .hud-left,
        .hud-right {
            min-width: 0;
            display: flex;
            align-items: center;
        }
        .hud-left {
            flex: 0 0 auto;
            gap: 0;
        }
        .hud-right {
            flex: 1 1 auto;
            margin-left: 0;
            justify-content: flex-end;
            gap: calc(12px * var(--hud-ui-scale));
        }
        .hud-score {
            flex: 0 0 calc(92px * var(--hud-ui-scale));
            min-width: calc(92px * var(--hud-ui-scale));
            display: flex;
            flex-direction: column;
            gap: calc(2px * var(--hud-ui-scale));
            white-space: nowrap;
        }
        .hud-score-label,
        .hud-meter-label {
            font-size: calc(9px * var(--hud-ui-scale));
            line-height: 1;
            letter-spacing: 0.05em;
            opacity: 0.92;
        }
        .hud-meter-label {
            color: #ffffff;
            text-shadow: var(--theme-shadow);
            opacity: 0.96;
        }
        .hud-score-value {
            line-height: 1;
            font-size: calc(17px * var(--hud-ui-scale));
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum" 1;
        }
        .hud-meters {
            min-width: 0;
            display: grid;
            grid-template-columns: repeat(3, max-content);
            gap: calc(12px * var(--hud-ui-scale));
            align-items: end;
        }
        .hud-meter {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: calc(1px * var(--hud-ui-scale));
            align-items: flex-start;
        }
        .hud-meter + .hud-meter {
            border-left: 1px solid color-mix(in srgb, var(--theme-color) 26%, transparent);
            padding-left: calc(10px * var(--hud-ui-scale));
        }
        .hud-meter-bar {
            font-family: 'Courier New', Courier, monospace;
            font-size: calc(12px * var(--hud-ui-scale));
            line-height: 1;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            --fill-alpha: 0.4;
        }
        .hud-bar-block {
            display: inline-block;
            opacity: 0.86;
        }
        .hud-bar-block-filled {
            opacity: calc(0.38 + var(--fill-alpha) * 0.62);
            will-change: opacity, filter;
        }
        .hud-meter-bar.is-full .hud-bar-block-filled {
            animation: hud-meter-full-shimmer 1.35s ease-in-out infinite;
            animation-delay: calc(var(--bar-idx, 0) * 64ms);
        }
        @keyframes hud-meter-shimmer {
            0%, 100% {
                opacity: calc(0.42 + var(--fill-alpha) * 0.58);
                filter: brightness(1);
            }
            45% {
                opacity: calc(0.52 + var(--fill-alpha) * 0.72);
                filter: brightness(calc(1.12 + var(--fill-alpha) * 0.22));
            }
            60% {
                opacity: calc(0.62 + var(--fill-alpha) * 0.82);
                filter: brightness(calc(1.22 + var(--fill-alpha) * 0.35));
            }
        }
        @keyframes hud-meter-shimmer-soft {
            0%, 100% {
                opacity: calc(0.46 + var(--fill-alpha) * 0.5);
                filter: brightness(1);
            }
            50% {
                opacity: calc(0.56 + var(--fill-alpha) * 0.6);
                filter: brightness(calc(1.08 + var(--fill-alpha) * 0.18));
            }
        }
        @keyframes hud-meter-shimmer-bomb-ready {
            0%, 100% {
                opacity: calc(0.48 + var(--fill-alpha) * 0.54);
                filter: brightness(1.02);
            }
            42% {
                opacity: calc(0.58 + var(--fill-alpha) * 0.64);
                filter: brightness(calc(1.12 + var(--fill-alpha) * 0.2));
            }
            60% {
                opacity: calc(0.64 + var(--fill-alpha) * 0.7);
                filter: brightness(calc(1.18 + var(--fill-alpha) * 0.26));
            }
        }
        @keyframes hud-meter-full-shimmer {
            0%, 100% {
                opacity: calc(0.48 + var(--fill-alpha) * 0.54);
                filter: brightness(1.02);
            }
            45% {
                opacity: calc(0.58 + var(--fill-alpha) * 0.64);
                filter: brightness(calc(1.14 + var(--fill-alpha) * 0.2));
            }
            62% {
                opacity: calc(0.66 + var(--fill-alpha) * 0.68);
                filter: brightness(calc(1.22 + var(--fill-alpha) * 0.24));
            }
        }
        .hud-weapon-wrap {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
            margin-left: 0;
            margin-right: 0;
        }
        .hud-weapon-grid {
            display: grid;
            grid-template-columns: repeat(5, var(--hud-weapon-cell));
            grid-template-rows: repeat(2, var(--hud-weapon-cell));
            gap: calc(2px * var(--hud-ui-scale));
            padding: calc(4px * var(--hud-ui-scale));
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.08);
        }
        .hud-weapon-cell {
            width: var(--hud-weapon-cell);
            height: var(--hud-weapon-cell);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(var(--hud-weapon-cell) - 1px);
            font-family: 'Courier New', Courier, monospace;
        }
        .hud-weapon-icon {
            width: calc(var(--hud-weapon-cell) * 1.08);
            height: calc(var(--hud-weapon-cell) * 1.08);
            display: block;
            overflow: visible;
            position: relative;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1;
        }
        .hud-chain-bolt,
        .hud-chain-spark {
            position: absolute;
            display: block;
            font-weight: 900;
            line-height: 1;
        }
        .hud-chain-bolt {
            font-size: calc(var(--hud-weapon-cell) * 0.86);
        }
        .hud-chain-spark {
            color: #f7feff;
            font-size: calc(var(--hud-weapon-cell) * 0.54);
        }
        .hud-status {
            flex: 1 1 calc(246px * var(--hud-ui-scale));
            display: flex;
            align-items: center;
            white-space: nowrap;
            font-size: calc(13px * var(--hud-ui-scale));
            width: auto;
            min-width: calc(210px * var(--hud-ui-scale));
            max-width: calc(270px * var(--hud-ui-scale));
            justify-content: flex-end;
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum" 1;
        }
        .hud-wave-panel {
            --hud-wave-color: var(--theme-color);
            --hud-combo-color: var(--theme-color);
            position: relative;
            flex: 1 1 auto;
            min-width: 0;
            height: calc(34px * var(--hud-ui-scale));
            display: grid;
            grid-template-columns: calc(48px * var(--hud-ui-scale)) calc(46px * var(--hud-ui-scale)) minmax(0, 1fr);
            grid-template-rows: 1fr 1fr;
            column-gap: calc(6px * var(--hud-ui-scale));
            align-items: center;
            padding: calc(3px * var(--hud-ui-scale)) calc(7px * var(--hud-ui-scale)) calc(3px * var(--hud-ui-scale)) calc(9px * var(--hud-ui-scale));
            box-sizing: border-box;
            border: 1px solid color-mix(in srgb, var(--hud-wave-color) 68%, transparent);
            background:
                linear-gradient(90deg, color-mix(in srgb, var(--hud-wave-color) 16%, transparent), rgba(0, 0, 0, 0.42) 48%, rgba(0, 0, 0, 0.12)),
                rgba(2, 8, 14, 0.66);
            box-shadow:
                inset 0 0 calc(10px * var(--hud-ui-scale)) color-mix(in srgb, var(--hud-wave-color) 18%, transparent),
                0 0 calc(8px * var(--hud-ui-scale)) color-mix(in srgb, var(--hud-wave-color) 12%, transparent);
            overflow: hidden;
        }
        .hud-wave-panel::before {
            content: "";
            position: absolute;
            left: 0;
            top: calc(5px * var(--hud-ui-scale));
            bottom: calc(5px * var(--hud-ui-scale));
            width: calc(2px * var(--hud-ui-scale));
            background: var(--hud-wave-color);
            box-shadow: 0 0 calc(7px * var(--hud-ui-scale)) var(--hud-wave-color);
            opacity: 0.86;
        }
        .hud-wave-panel.is-standard {
            --hud-wave-color: color-mix(in srgb, var(--theme-color) 54%, #7b8b96);
        }
        .hud-wave-panel.is-fresh {
            animation: hud-wave-acquire 1.15s ease-out infinite;
        }
        .hud-level-chip {
            grid-row: 1 / 3;
            grid-column: 1;
            align-self: stretch;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: calc(2px * var(--hud-ui-scale));
            padding-right: calc(6px * var(--hud-ui-scale));
            border-right: 1px solid color-mix(in srgb, var(--hud-wave-color) 42%, transparent);
            color: color-mix(in srgb, var(--hud-wave-color) 70%, #ffffff);
            line-height: 1;
            text-align: right;
            text-shadow: none;
        }
        .hud-combo-chip {
            grid-row: 1 / 3;
            grid-column: 2;
            align-self: stretch;
            min-width: 0;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: calc(1px * var(--hud-ui-scale));
            padding-right: calc(5px * var(--hud-ui-scale));
            border-right: 1px solid color-mix(in srgb, var(--hud-wave-color) 38%, transparent);
            line-height: 1;
            text-align: center;
            color: color-mix(in srgb, var(--hud-combo-color) 78%, #ffffff);
            text-shadow: none;
            transform-origin: center;
            will-change: transform, filter;
        }
        .hud-combo-chip::after {
            content: "";
            position: absolute;
            z-index: 0;
            left: calc(5px * var(--hud-ui-scale));
            right: calc(9px * var(--hud-ui-scale));
            top: 50%;
            height: 1px;
            background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--hud-combo-color) 54%, transparent), transparent);
            opacity: 0.22;
            transform: translateY(-50%);
            pointer-events: none;
        }
        .hud-combo-chip > * {
            position: relative;
            z-index: 1;
        }
        .hud-level-main {
            color: #ffffff;
            font-size: calc(12px * var(--hud-ui-scale));
            line-height: 1;
            text-shadow: 0 0 calc(6px * var(--hud-ui-scale)) var(--hud-wave-color);
        }
        .hud-level-score {
            color: color-mix(in srgb, var(--hud-wave-color) 76%, #ffffff);
            font-size: calc(8px * var(--hud-ui-scale));
            line-height: 1;
            letter-spacing: 0.04em;
            opacity: 0.94;
        }
        .hud-combo-label {
            color: color-mix(in srgb, var(--hud-combo-color) 68%, #ffffff);
            font-size: calc(6px * var(--hud-ui-scale));
            letter-spacing: 0.06em;
            opacity: 0.78;
        }
        .hud-combo-main {
            color: #ffffff;
            font-size: calc(12px * var(--hud-ui-scale));
            line-height: 0.92;
            text-shadow: 0 0 calc(6px * var(--hud-ui-scale)) var(--hud-combo-color);
        }
        .hud-combo-mult {
            color: color-mix(in srgb, var(--hud-combo-color) 80%, #ffffff);
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: calc(7px * var(--hud-ui-scale));
            letter-spacing: 0.03em;
            opacity: 0.94;
        }
        .hud-combo-chip.is-empty {
            opacity: 0.82;
        }
        .hud-combo-chip.is-event-text .hud-combo-mult {
            color: #ffffff;
            text-shadow: 0 0 calc(5px * var(--hud-ui-scale)) var(--hud-combo-color);
        }
        .hud-combo-chip.is-combo-pop {
            animation: hud-combo-pop 0.34s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .hud-combo-chip.is-combo-break {
            animation: hud-combo-break 0.45s ease-out;
        }
        .hud-combo-chip.is-boss-break {
            animation: hud-combo-boss-break 1.15s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .hud-wave-main,
        .hud-wave-mod {
            grid-column: 3;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1;
            text-align: left;
        }
        .hud-wave-main {
            color: #ffffff;
            font-size: calc(13px * var(--hud-ui-scale));
            text-shadow: 0 0 calc(6px * var(--hud-ui-scale)) var(--hud-wave-color);
        }
        .hud-wave-mod {
            color: color-mix(in srgb, var(--hud-wave-color) 82%, #ffffff);
            font-size: calc(8px * var(--hud-ui-scale));
            letter-spacing: 0.04em;
            opacity: 0.92;
            text-shadow: none;
        }
        @keyframes hud-wave-acquire {
            0%, 100% {
                filter: brightness(1);
            }
            45% {
                filter: brightness(1.22);
            }
        }
        @keyframes hud-combo-pop {
            0% {
                transform: scale(1);
                filter: brightness(1);
            }
            42% {
                transform: scale(1.12);
                filter: brightness(1.45);
            }
            100% {
                transform: scale(1);
                filter: brightness(1);
            }
        }
        @keyframes hud-combo-break {
            0% {
                transform: translateX(0);
                filter: brightness(1.5);
            }
            22% {
                transform: translateX(calc(-2px * var(--hud-ui-scale)));
            }
            48% {
                transform: translateX(calc(2px * var(--hud-ui-scale)));
                filter: brightness(1.15);
            }
            100% {
                transform: translateX(0);
                filter: brightness(1);
            }
        }
        @keyframes hud-combo-boss-break {
            0% {
                transform: scale(1);
                filter: brightness(1);
            }
            18% {
                transform: scale(1.2);
                filter: brightness(1.75);
            }
            46% {
                transform: scale(0.98);
                filter: brightness(1.25);
            }
            72% {
                transform: scale(1.08);
                filter: brightness(1.55);
            }
            100% {
                transform: scale(1);
                filter: brightness(1);
            }
        }
        .hud-sep {
            color: #555555;
            text-shadow: none;
            padding: 0 calc(2px * var(--hud-ui-scale));
        }
        #fps {
            position: absolute;
            top: 15px;
            right: 15px;
            color: var(--theme-fps);
            font-family: 'Electrolize', 'Courier New', sans-serif;
            font-size: clamp(6px, 0.8vw, 10px);
            font-weight: normal;
            pointer-events: none;
            text-shadow: none;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        #fps-low-perf {
            display: none;
            color: #ff0000;
            font-weight: bold;
            margin-bottom: -2px;
        }
        #stats-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 4;
            min-width: 128px;
            max-width: min(230px, 44vw);
            box-sizing: border-box;
            padding: 6px 8px 7px;
            border: 1px solid color-mix(in srgb, var(--theme-color) 24%, transparent);
            background:
                linear-gradient(90deg, color-mix(in srgb, var(--theme-color) 10%, transparent), rgba(0, 0, 0, 0.34)),
                rgba(0, 0, 0, 0.28);
            color: var(--theme-fps);
            font-family: 'Electrolize', 'Courier New', sans-serif;
            font-size: clamp(7px, 0.78vw, 10px);
            line-height: 1;
            pointer-events: none;
            text-shadow: none;
            box-shadow:
                inset 0 0 10px color-mix(in srgb, var(--theme-color) 10%, transparent),
                0 0 8px rgba(0, 0, 0, 0.22);
            display: none;
        }
        .stats-panel-title {
            color: #ffffff;
            font-size: 0.92em;
            letter-spacing: 0.08em;
            margin-bottom: 5px;
            opacity: 0.9;
        }
        .stats-row {
            display: grid;
            grid-template-columns: minmax(56px, 0.9fr) minmax(48px, 1.1fr);
            gap: 10px;
            align-items: baseline;
            padding: 2px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.045);
        }
        .stats-row:first-of-type {
            border-top: 0;
        }
        .stats-label {
            color: color-mix(in srgb, var(--theme-fps) 72%, #ffffff);
            opacity: 0.72;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .stats-value {
            color: color-mix(in srgb, var(--theme-color) 52%, #ffffff);
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            justify-content: flex-end;
            align-items: baseline;
            gap: 5px;
        }
        .stats-main {
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }
        .stats-delta {
            flex: 0 0 auto;
            font-size: 0.86em;
            opacity: 0;
            animation: stats-delta-pop 1.55s ease-out forwards;
        }
        .stats-delta.is-up {
            color: #62ff9d;
            text-shadow: 0 0 5px rgba(98, 255, 157, 0.45);
        }
        .stats-delta.is-down {
            color: #ff5e8a;
            text-shadow: 0 0 5px rgba(255, 94, 138, 0.42);
        }
        @keyframes stats-delta-pop {
            0% {
                opacity: 0;
                transform: translateY(3px) scale(0.9);
            }
            14% {
                opacity: 1;
                transform: translateY(0) scale(1.08);
            }
            72% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-4px) scale(0.94);
            }
        }
        #firewall-wrapper {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            left: -9999px;
        }
        #crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.06) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.014), rgba(0, 255, 0, 0.006), rgba(0, 0, 255, 0.014));
            background-size: 100% 4px, 6px 100%;
            opacity: 0.32;
            pointer-events: none;
            display: none;
            z-index: 10;
        }
    </style>
</head>
<body>
