            let inputX = ((keys.d || keys.arrowright) ? 1 : 0) - ((keys.a || keys.arrowleft) ? 1 : 0), inputY = ((keys.s || keys.arrowdown) ? 1 : 0) - ((keys.w || keys.arrowup) ? 1 : 0);
            if (inputX !== 0 && inputY !== 0) { inputX *= 0.707; inputY *= 0.707; }
            
            player.vx = (player.vx + inputX * P_ACCEL * (1 + player.modifiers.moveSpeed) * dt) * P_FRICTION;
            player.vy = (player.vy + inputY * P_ACCEL * (1 + player.modifiers.moveSpeed) * dt) * P_FRICTION;
            player.x = Math.max(50, Math.min(width - 50, player.x + player.vx * dt));
            player.y = Math.max(50, Math.min(height - 50, player.y + player.vy * dt));
            applyWakeForce(player.x, player.y, 110, (Math.sqrt(player.vx * player.vx + player.vy * player.vy) / P_MAX_SPEED) * 14);

            const actualFireRate = (player.fireRate / player.weaponStats.fireRateMult) / (1 + player.modifiers.fireRate);
            player.isBeaming = player.weaponStats.mode === 'beam';

            if (!player.isBeaming && performance.now() - player.lastFire > actualFireRate) {
                fireCombo();
            }

            if (player.isBeaming) {
                let s = player.weaponStats;
                let baseDmg = (60 * s.damageMult + player.modifiers.laserDamage * 6) * dt;
                if (player.hp < player.maxHp * 0.5) baseDmg *= (1 + player.modifiers.adrenaline);

                let baseAngle = -Math.PI/2;
                if (s.homing) {
                    let nearest = null, minDist = Infinity;
                    enemies.concat(boss && boss.phase === 'ACTIVE' ? [boss] : []).forEach(e => {
                        let dSq = (e.x - player.x)**2 + (e.y - player.y)**2;
                        if (dSq < minDist) { minDist = dSq; nearest = e; }
                    });
                    if (nearest) {
                        baseAngle = Math.atan2(nearest.y - player.y, nearest.x - player.x);
                    }
                }

                let angles = [];
                if (s.pelletCount === 1) angles.push(baseAngle);
                else {
                    let startAngle = baseAngle - s.spreadAngle/2;
                    let step = s.spreadAngle / (s.pelletCount - 1);
                    for(let i=0; i<s.pelletCount; i++) angles.push(startAngle + step * i);
                }
                if (s.hasRearFire) {
                    let rearAngles = angles.map(a => a + Math.PI);
                    angles = angles.concat(rearAngles);
                }

                angles.forEach(a => {
                    let dx = Math.cos(a), dy = Math.sin(a);
                    let hitEnemies = [];
                    enemies.concat(boss && boss.phase === 'ACTIVE' ? [boss] : []).forEach(e => {
                        let ex = e.x - player.x, ey = e.y - player.y;
                        let t = ex * dx + ey * dy;
                        if (t > 0) {
                            let px = player.x + t * dx, py = player.y + t * dy;
                            let distSq = (e.x - px)**2 + (e.y - py)**2;
                            let hitRadius = 25 * s.sizeMult;
                            if (e.isGlitch || e.name === 'OVERHEATING FIREWALL' || e.name === 'NULL PHANTOM') hitRadius += 30;
                            if (distSq < hitRadius * hitRadius) hitEnemies.push({e, t});
                        }
                    });
                    hitEnemies.sort((A,B) => A.t - B.t);

                    let pierce = s.pierceCount;
                    for (let hit of hitEnemies) {
                        let e = hit.e;
                        e.hp -= baseDmg;
                        e.flashTimer = 0.15;
                        if (e === boss && maybeTriggerBossDeathCinematic(e)) return;
                        if (s.splashRadius > 0 && Math.random() < 0.1) {
                            radialExplosion(e.x, e.y, s.splashRadius * 22, baseDmg * s.splashDamagePercent * 5);
                            if (bossCinematic && bossCinematic.paused) return;
                        }
                        if (e.hp <= 0 && !e.name) {
                            let idx = enemies.indexOf(e);
                            if (idx > -1) { explodeEnemy(e); enemies.splice(idx, 1); }
                        }
                        if (pierce-- <= 0) break;
                    }
                });
            }

            if (player.weaponStats.hasOrbitalDrones) {
                player.drones.forEach(d => {
                    d.angle += 3 * dt;
                    let dx = Math.cos(d.angle) * 45;
                    let dy = Math.sin(d.angle) * 45;
                    d.x = player.x + dx;
                    d.y = player.y + dy;

                    d.timer -= dt;
                    if (d.timer <= 0) {
                        d.timer = 0.2 / player.weaponStats.fireRateMult / (1 + player.modifiers.fireRate) * 1.66;
                        let nearest = null, minDist = Infinity;
                        enemies.concat(boss && boss.phase === 'ACTIVE' ? [boss] : []).forEach(e => {
                            let distSq = (e.x - d.x)**2 + (e.y - d.y)**2;
                            if (distSq < 400*400 && distSq < minDist) { minDist = distSq; nearest = e; }
                        });
                        if (nearest) {
                            let angle = Math.atan2(nearest.y - d.y, nearest.x - d.x);
                            let speed = 1000;
                            let droneDmg = (10 * player.weaponStats.damageMult + player.modifiers.laserDamage) * 0.3;
                            if (player.hp < player.maxHp * 0.5) droneDmg *= (1 + player.modifiers.adrenaline);
                            comboProjectiles.push({
                                x: d.x, y: d.y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
                                baseVx: Math.cos(angle)*speed, baseVy: Math.sin(angle)*speed, startX: d.x, startY: d.y,
                                sprite: '•', color: '#aa00ff',
                                stats: { ...player.weaponStats, sizeMult: 0.5, pierceCount: 0, splashRadius: 0, chainCount: 0, pathFunction: 'straight', homing: false },
                                life: 1.0, maxLife: 1.0, damage: droneDmg,
                                pierceHits: [], pierceCount: 0
                            });
                        }
                    }
                });
            }
            
            if (player.bombTimer > 0) player.bombTimer -= dt;
            if (keys[' '] && player.bombTimer <= 0) fireBomb();
            if (bossCinematic && bossCinematic.paused) return;
            
            if (player.hp < player.maxHp) {
                player.hp = Math.min(player.maxHp, player.hp + player.modifiers.hpRegen * dt);
            }
            if (player.invincibilityTimer > 0) {
                player.invincibilityTimer -= dt;
            }

            if (Math.random() > 0.3) {
                const thrusterAnchors = getPlayerThrusterAnchors(getPlayerRenderLayout(player));
                thrusterAnchors.forEach(anchor => {
                    thrusterParticles.push({ 
                        x: anchor.x + (Math.random()-0.5)*5, y: anchor.y, 
                        vx: (Math.random()-0.5)*40, vy: 280 + Math.random()*120, 
                        char: ['^', '*', '.', 'v'][Math.floor(Math.random()*4)], 
                        color: null,
                        life: 1.0, isSmoke: false 
                    });
                });
            }
            if (Math.random() > 0.7) {
                const thrusterAnchors = getPlayerThrusterAnchors(getPlayerRenderLayout(player));
                thrusterAnchors.forEach(anchor => {
                    thrusterParticles.push({
                        x: anchor.x + (Math.random()-0.5)*8, y: anchor.y - 5,
                        vx: (Math.random()-0.5)*80, vy: 150 + Math.random()*50,
                        char: ['░', '▒', '·'][Math.floor(Math.random()*3)],
                        color: ['#555555', '#444444'][Math.floor(Math.random()*2)],
                        life: 0.8, isSmoke: true
                    });
                });
            }

            for (let i = thrusterParticles.length - 1; i >= 0; i--) {
                const t = thrusterParticles[i]; 
                t.x += t.vx * dt; t.y += t.vy * dt; 
                t.life -= dt * (t.isSmoke ? 1.0 : (t.isGuardianFlame ? 2.0 : 2.8));
                if (!t.isSmoke && !t.isGuardianFlame) applyWakeForce(t.x, t.y, 30, 1.4); 
                if (t.life <= 0) thrusterParticles.splice(i, 1);
            }

            // XP Magnet
            const magnetRangeSq = 22500 * (1 + player.modifiers.magnet);
            for (let i = xpOrbs.length - 1; i >= 0; i--) {
                const orb = xpOrbs[i];
                const dx = player.x - orb.x, dy = player.y - orb.y;
                const distSq = dx * dx + dy * dy;
                if (distSq < magnetRangeSq) {
                    const dist = Math.sqrt(distSq);
                    orb.vx = (dx / dist) * 1000; orb.vy = (dy / dist) * 1000;
                } else {
                    orb.vx *= 0.95; orb.vy = 120;
                }
                orb.x += orb.vx * dt; orb.y += orb.vy * dt;
                if (distSq < 1600) {
                    player.xp += (orb.xpValue || 1);
                    if (player.xp >= player.xpNeeded && !boss) {
                        player.xp -= player.xpNeeded; 
                        player.level++; 
                        player.xpNeeded = Math.floor(player.xpNeeded * 2.0);
                        gameState = 'LEVELUP';
                        if (!isMuted) gainNode.gain.value = currentVolume * 0.75;
                        levelUpState = 'OFFERING';
                        levelUpTimer = 0;
                        selectedOptionIndex = 0;
                        offeredOptions = drawOptions(POWERUP_POOL, 3, player.level);
                    }
                    xpOrbs.splice(i, 1); score += 50;
                } else if (orb.y > height + 60) xpOrbs.splice(i, 1);
            }

            // Enemies Firing
            enemies.forEach(e => {
                if (Math.random() < 0.01 && e.y > 0 && !e.isFlameGuardian) {
                    const dx = player.x - e.x, dy = player.y - e.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    enemyBullets.push({ x: e.x, y: e.y, vx: (dx/dist)*320, vy: (dy/dist)*320, char: 'o', color: '#ff00ff' });
                }
            });

            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const b = enemyBullets[i]; 
                
                if (b.isGlitchBullet) {
                    b.morphTimer += dt;
                    if (b.morphTimer > 0.12) {
                        b.morphTimer = 0;
                        if (b.isCodeLine) {
                            // Randomly mutate a few characters in the code line
                            const codeChars = 'ﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙ01{}[];:=></%!&|~';
                            let arr = b.char.split('');
                            for (let m = 0; m < 2; m++) {
                                const idx = Math.floor(Math.random() * arr.length);
                                arr[idx] = codeChars[Math.floor(Math.random() * codeChars.length)];
                            }
                            b.char = arr.join('');
                        } else {
                            b.char = GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)];
                        }
                    }
                }
                
                if (b.isZigZag) {
                    b.zigTimer += dt;
                    if (b.zigTimer > 0.35) {
                        b.zigTimer -= 0.35;
                        b.zigDir *= -1;
                    }
                    const length = Math.sqrt(b.baseVx * b.baseVx + b.baseVy * b.baseVy);
                    if (length > 0) {
                        const perpX = -b.baseVy / length;
                        const perpY = b.baseVx / length;
                        const amplitude = 200;
                        b.vx = b.baseVx + perpX * amplitude * b.zigDir;
                        b.vy = b.baseVy + perpY * amplitude * b.zigDir;
                    }
                }
                
                b.x += b.vx * dt; b.y += b.vy * dt;
                
                if (b.decay) {
                    b.life -= b.decay * dt;
                    if (b.life <= 0) { enemyBullets.splice(i, 1); continue; }
                }

                const dx = b.x - player.x, dy = b.y - player.y;
                const hitboxR = 30 * player.modifiers.hitbox;
                
                if (dx * dx + dy * dy < hitboxR * hitboxR * (b.decay ? Math.max(0.1, b.life) : 1)) {
                    if (player.invincibilityTimer <= 0) {
                        player.hp -= 10; 
                        addShake(15); 
                        wobble = 1.0; 
                        player.invincibilityTimer = 0.4 + player.modifiers.invincibility;
                        player.flashTimer = player.invincibilityTimer;
                        for (let j = 0; j < 5; j++) debris.push({ x: player.x, y: player.y, vx: (Math.random()-0.5)*120, vy: -120 + (Math.random()-0.5)*60, char: ['░', '▒', '·', '∙'][Math.floor(Math.random()*4)], color: Math.random() > 0.5 ? '#555555' : '#888888', life: 0.6 });
                        
                        if (player.hp <= 0) {
                            gameState = 'DYING';
                            deathTimer = 0;
                            shake = 0;
                            fadeMusicForDeath();
                        }
                    }
                    enemyBullets.splice(i, 1);
                } else if (b.y > height + 50 || b.y < -50 || b.x < -50 || b.x > width + 50) {
                    enemyBullets.splice(i, 1);
                }
            }


            // Boss Update Loop
            if (boss) {
                if (boss.flashTimer > 0) boss.flashTimer -= dt;

                if (boss.isGlitch) {
                    if (boss.phase === 'INTRO') {
                        boss.y += 65 * dt;
                        boss.timer += dt;
                        if (boss.timer > 4) {
                            boss.phase = 'ACTIVE';
                            boss.timer = 0;
                        }
                    } else {
                        boss.colorCycleTimer += dt;
                        if (boss.isDeadGlitching) {
                            const c1 = boss.stage === 1 ? '#ff00ff' : '#ffffff';
                            const c2 = boss.stage === 1 ? '#00ffff' : '#ff0000';
                            boss.color = (Math.floor(Date.now() / 100) % 2 === 0) ? c1 : c2;
                        } else if (boss.stage === 1) {
                            boss.color = (boss.colorCycleTimer % 2.0 < 1.0) ? '#ff00ff' : '#00ffff';
                        } else {
                            boss.color = (boss.colorCycleTimer % 1.0 < 0.5) ? '#ffffff' : '#ff0000';
                        }

                        if (maybeTriggerBossDeathCinematic(boss)) return;

                        if (boss.stage === 1 && boss.hp <= boss.maxHp / 2) {
                            boss.stage = 2;
                            boss.transitionFlash = 0.3;
                            boss.transitionTextTimer = 2.0;
                            boss.hp = Math.min(boss.maxHp, boss.hp + boss.maxHp * 0.25);
                            boss.x = width / 2;
                            boss.y = height / 3;
                            boss.sprite = GLITCH_SPRITE_2;
                            boss.chargeTimer = 0;
                            boss.isCharging = false;
                            boss.baseSpeed = 150;
                        }

                        if (boss.transitionTextTimer > 0) boss.transitionTextTimer -= dt;
                        if (boss.transitionFlash > 0) boss.transitionFlash -= dt;

                        if (boss.transitionFlash <= 0 && !boss.isCharging) {
                            boss.dirChangeTimer -= dt;
                            if (boss.dirChangeTimer <= 0) {
                                boss.dirChangeTimer = boss.stage === 1 ? 2.0 + Math.random() * 2.0 : 1.0 + Math.random() * 1.5;
                                const angle = Math.random() * Math.PI * 2;
                                const spdMult = 0.5 + Math.random() * 1.5;
                                boss.glitchVx = Math.cos(angle) * boss.baseSpeed * spdMult;
                                boss.glitchVy = Math.sin(angle) * boss.baseSpeed * spdMult;
                            }

                            if (Math.random() > 0.20) {
                                boss.x += boss.glitchVx * dt;
                                boss.y += boss.glitchVy * dt;
                            }

                            const pad = 60;
                            if (boss.x < pad) { boss.x = pad; boss.glitchVx *= -1; }
                            if (boss.x > width - pad) { boss.x = width - pad; boss.glitchVx *= -1; }
                            if (boss.y < pad) { boss.y = pad; boss.glitchVy *= -1; }
                            if (boss.y > height / 2) { boss.y = height / 2; boss.glitchVy *= -1; }

                            boss.sprite = boss.stage === 1
                                ? (Math.random() > 0.7 ? GLITCH_SPRITE_1B : GLITCH_SPRITE_1)
                                : (Math.random() > 0.7 ? GLITCH_SPRITE_2B : GLITCH_SPRITE_2);

                            if (Math.random() < (boss.stage === 1 ? 0.04 : 0.08) * (dt * 60)) {
                                const megaGlitch = Math.random() > 0.85;
                                const tDist = megaGlitch ? 150 + Math.random() * 150 : 30 + Math.random() * 50;
                                const tAngle = Math.random() * Math.PI * 2;

                                if (megaGlitch) {
                                    for (let k = 0; k < 15; k++) {
                                        debris.push({
                                            x: boss.x + (Math.random() - 0.5) * 50,
                                            y: boss.y + (Math.random() - 0.5) * 50,
                                            vx: 0,
                                            vy: 0,
                                            char: GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)],
                                            color: boss.color,
                                            life: 0.3
                                        });
                                    }
                                    addShake(5);
                                }

                                boss.x = Math.max(pad, Math.min(width - pad, boss.x + Math.cos(tAngle) * tDist));
                                boss.y = Math.max(pad, Math.min(height - 150, boss.y + Math.sin(tAngle) * tDist));
                            }

                            boss.chargeTimer += dt;
                            const chargeCycle = boss.stage === 1 ? 4.0 : 2.5;
                            if (boss.chargeTimer >= chargeCycle) {
                                boss.isCharging = true;
                                boss.chargeDuration = 0;
                                if (boss.stage === 2) {
                                    boss.isDoubleCharge = Math.random() < 0.4;
                                    boss.doubleChargePhase = 1;
                                }
                            } else {
                                boss.scatterTimer -= dt;
                                if (boss.scatterTimer <= 0) {
                                    boss.scatterTimer = boss.stage === 1 ? 0.65 + Math.random() * 1.0 : 0.4 + Math.random() * 0.8;
                                    const count = boss.stage === 1 ? 3 : 5;
                                    for (let i = 0; i < count; i++) {
                                        const a = Math.random() * Math.PI * 2;
                                        enemyBullets.push({
                                            x: boss.x,
                                            y: boss.y,
                                            vx: Math.cos(a) * 200,
                                            vy: Math.sin(a) * 200,
                                            char: '\uFF8A',
                                            color: '#00ff41',
                                            isGlitchBullet: true,
                                            morphTimer: 0
                                        });
                                    }
                                }

                                boss.codeVolleyTimer -= dt;
                                if (boss.isCodeVolley) {
                                    boss.codeVolleyDelay -= dt;
                                    if (boss.codeVolleyDelay <= 0 && boss.codeVolleyShots < 5) {
                                        boss.codeVolleyShots++;
                                        boss.codeVolleyDelay = 0.4;
                                        const codeChars = GLITCH_CHARS.join('') + '01{}[];:=></%!&|~';
                                        const lineLen = 5 + Math.floor(Math.random() * 11);
                                        let codeLine = '';
                                        for (let k = 0; k < lineLen; k++) {
                                            codeLine += codeChars[Math.floor(Math.random() * codeChars.length)];
                                        }
                                        const dx = player.x - boss.x;
                                        const dy = player.y - boss.y;
                                        const baseAngle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 0.6;
                                        const speed = 350 + Math.random() * 100;
                                        enemyBullets.push({
                                            x: boss.x,
                                            y: boss.y,
                                            vx: Math.cos(baseAngle) * speed,
                                            vy: Math.sin(baseAngle) * speed,
                                            char: codeLine,
                                            color: '#00ff41',
                                            isGlitchBullet: true,
                                            isCodeLine: true,
                                            morphTimer: 0
                                        });
                                        if (boss.codeVolleyShots >= 5) {
                                            boss.isCodeVolley = false;
                                            boss.codeVolleyTimer = boss.stage === 1 ? 5.0 + Math.random() * 3.0 : 3.0 + Math.random() * 2.0;
                                        }
                                    }
                                } else if (boss.codeVolleyTimer <= 0) {
                                    boss.isCodeVolley = true;
                                    boss.codeVolleyShots = 0;
                                    boss.codeVolleyDelay = 0;
                                }
                            }
                        } else if (boss.isCharging) {
                            boss.chargeDuration += dt;
                            boss.glowIntensity = Math.min(1.0, boss.chargeDuration / 1.0);
                            shake = Math.max(shake, 8 * boss.glowIntensity);
                            if (boss.chargeDuration >= 1.0) {
                                addShake(20);
                                if (boss.isDoubleCharge && boss.doubleChargePhase === 1) {
                                    for (let i = 0; i < 12; i++) {
                                        const a = (i / 12) * Math.PI * 2;
                                        enemyBullets.push({
                                            x: boss.x,
                                            y: boss.y,
                                            vx: Math.cos(a) * 400 * 1.5,
                                            vy: Math.sin(a) * 400 * 1.5,
                                            char: '\uFF8A',
                                            color: '#00ff41',
                                            life: 1.0,
                                            decay: 0.55,
                                            isHuge: true,
                                            isGlitchBullet: true,
                                            morphTimer: 0
                                        });
                                    }
                                    boss.doubleChargePhase = 2;
                                    boss.chargeDuration = 0;
                                } else {
                                    boss.isCharging = false;
                                    boss.chargeTimer = 0;
                                    if (boss.isDoubleCharge && boss.doubleChargePhase === 2) {
                                        const angleToPlayer = Math.atan2(player.y - boss.y, player.x - boss.x);
                                        const offset = Math.PI / 12;
                                        for (let i = 0; i < 12; i++) {
                                            const a = angleToPlayer + offset + (i / 12) * Math.PI * 2;
                                            enemyBullets.push({
                                                x: boss.x,
                                                y: boss.y,
                                                vx: Math.cos(a) * 400 * 1.5,
                                                vy: Math.sin(a) * 400 * 1.5,
                                                char: '\uFF8A',
                                                color: '#00ff41',
                                                life: 1.0,
                                                decay: 0.55,
                                                isHuge: true,
                                                isGlitchBullet: true,
                                                morphTimer: 0
                                            });
                                        }
                                        boss.isDoubleCharge = false;
                                    } else {
                                        for (let i = 0; i < 12; i++) {
                                            const a = (i / 12) * Math.PI * 2;
                                            enemyBullets.push({
                                                x: boss.x,
                                                y: boss.y,
                                                vx: Math.cos(a) * 400 * 1.5,
                                                vy: Math.sin(a) * 400 * 1.5,
                                                char: '\uFF8A',
                                                color: '#00ff41',
                                                life: 1.0,
                                                decay: 0.55,
                                                isHuge: true,
                                                isGlitchBullet: true,
                                                morphTimer: 0
                                            });
                                        }
                                    }
                                }
                            }
                        }
                    }
                } else {
                    if (boss.phase === 'INTRO') {
                        if (boss.name !== 'OVERHEATING FIREWALL') {
                            boss.y += 65 * dt;
                        } else if (boss.y < height * 0.65) {
                            boss.y += 100 * dt;
                        }

                        boss.timer += dt;
                        const introDuration = boss.name === 'GHOST SIGNAL' ? 7.5 : 4;
                        if (boss.name === 'GHOST SIGNAL' && boss.timer >= 5.0 && !boss.addsSpawned) {
                            boss.addsSpawned = true;
                            const fSprite = ["  \u25B2  ", " (\u2588) ", "(\u2588\u2588\u2588)", " \u2580\u2588\u2580 "];
                            enemies.push({ x: -50, y: boss.y, vx: 150, vy: 0, sprite: fSprite, color: '#e38914', hp: 200, maxHp: 200, isFlameGuardian: true, flashTimer: 0, hoverX: width * 0.2, fireTimer: 0 });
                            enemies.push({ x: width + 50, y: boss.y, vx: -150, vy: 0, sprite: fSprite, color: '#e38914', hp: 200, maxHp: 200, isFlameGuardian: true, flashTimer: 0, hoverX: width * 0.8, fireTimer: 0 });
                        }
                        if (boss.timer > introDuration) {
                            boss.phase = 'ACTIVE';
                            boss.timer = 0;
                            boss.color = boss.name === 'GHOST SIGNAL' ? '#00ffff' : (boss.name === 'OVERHEATING FIREWALL' ? '#ff6600' : '#ff00ff');
                            boss.startX = boss.x;
                            boss.startY = boss.y;
                        }
                    } else {
                        boss.timer += dt;

                        if (boss.name === 'NULL PHANTOM') {
                            boss.driftTimer = (boss.driftTimer || 0) + dt;
                            let w = 0.15;
                            if (Math.sin(boss.driftTimer * 0.5) > 0.7) w = 0.3;
                            boss.driftAngle = (boss.driftAngle || 0) + w * dt;
                            boss.x = boss.startX + Math.sin(boss.driftAngle) * (width * 0.35);
                            boss.y = boss.startY + Math.sin(boss.driftAngle * 2.1) * 15;
                            applyWakeForce(boss.x, boss.y, 250, 10);

                            boss.burstTimer = (boss.burstTimer || 0) + dt;
                            if (boss.burstTimer >= 2.5) {
                                boss.burstTimer = 0;
                                boss.burstCount = 3;
                                boss.burstDelay = 0;
                            }
                            if (boss.burstCount > 0) {
                                boss.burstDelay -= dt;
                                if (boss.burstDelay <= 0) {
                                    boss.burstDelay = 0.15;
                                    boss.burstCount--;
                                    const dx = player.x - boss.x;
                                    const dy = player.y - boss.y;
                                    const dist = Math.sqrt(dx * dx + dy * dy);
                                    enemyBullets.push({ x: boss.x, y: boss.y, vx: (dx / dist) * 500, vy: (dy / dist) * 500, char: 'x', color: '#ff00ff', isPhantomBullet: true });
                                }
                            }
                        } else if (boss.name === 'GHOST SIGNAL') {
                            boss.driftTimer = (boss.driftTimer || 0) + dt;
                            boss.x = boss.startX + Math.sin(boss.driftTimer * 0.55) * GHOST_SIGNAL_DRIFT_X;
                            boss.y = boss.startY + Math.sin(boss.driftTimer * 1.15) * GHOST_SIGNAL_DRIFT_Y;
                            applyWakeForce(boss.x, boss.y, 180, 5);
                        } else if (boss.name === 'OVERHEATING FIREWALL') {
                            boss.driftTimer = (boss.driftTimer || 0) + dt;
                            boss.x = width / 2 + Math.sin(boss.driftTimer * 0.5) * 50;

                            if (Math.random() > 0.4) {
                                thrusterParticles.push({
                                    x: boss.x + (Math.random() - 0.5) * 150,
                                    y: boss.y - 100 - Math.random() * 50,
                                    vx: (Math.random() - 0.5) * 40,
                                    vy: -50 - Math.random() * 50,
                                    char: ['\u2591', '\u2592', '\u00B7'][Math.floor(Math.random() * 3)],
                                    color: ['#555555', '#444444'][Math.floor(Math.random() * 2)],
                                    life: 1.2,
                                    isSmoke: true
                                });
                            }
                        }

                        if (boss.timer > 4) {
                            boss.timer = 0;
                            const numPatterns = boss.name === 'GHOST SIGNAL' ? 4 : 3;
                            boss.attackPattern = (boss.attackPattern + 1) % numPatterns;
                            boss.lastFire = 0;
                        }

                        const isPhantom = boss.name === 'NULL PHANTOM';
                        const fire = (vx, vy) => enemyBullets.push({ x: boss.x, y: boss.y, vx, vy, char: 'x', color: '#ff00ff', isPhantomBullet: isPhantom });

                        if (boss.name === 'OVERHEATING FIREWALL') {
                            const bossFire = (vx, vy, huge, isFlame) => enemyBullets.push({
                                x: boss.x,
                                y: boss.y + 20,
                                vx,
                                vy,
                                char: isFlame ? '\u274B' : '*',
                                color: isFlame ? '#e38914' : '#ff6600',
                                isHuge: huge,
                                isLargeFlame: isFlame,
                                life: huge ? 1.0 : 0,
                                decay: huge ? 0.6 : 0
                            });

                            if (boss.attackPattern === 0 && performance.now() - boss.lastFire > 800) {
                                for (let i = 0; i < 16; i++) {
                                    const a = (i / 16) * Math.PI * 2;
                                    bossFire(Math.cos(a) * 600, Math.sin(a) * 600, false, true);
                                }
                                boss.lastFire = performance.now();
                            } else if (boss.attackPattern === 1 && performance.now() - boss.lastFire > 120) {
                                bossFire((Math.random() - 0.5) * 600, 300 + Math.random() * 400, true, false);
                                boss.lastFire = performance.now();
                            } else if (boss.attackPattern === 2 && performance.now() - boss.lastFire > 1000) {
                                for (let i = 0; i < 20; i++) {
                                    const a = (i / 20) * Math.PI * 2;
                                    bossFire(Math.cos(a) * 300, Math.sin(a) * 300 + 150, false, true);
                                }
                                boss.lastFire = performance.now();
                            }
                        } else {
                            if (boss.attackPattern === 0 && performance.now() - boss.lastFire > 1000) {
                                for (let i = 0; i < 18; i++) {
                                    const a = (i / 18) * Math.PI * 2;
                                    fire(Math.cos(a) * 380, Math.sin(a) * 380);
                                }
                                boss.lastFire = performance.now();
                            } else if (boss.attackPattern === 1 && performance.now() - boss.lastFire > 60) {
                                boss.spiralAngle += 0.3;
                                fire(Math.cos(boss.spiralAngle) * 500, Math.sin(boss.spiralAngle) * 500);
                                boss.lastFire = performance.now();
                            } else if (boss.attackPattern === 2 && performance.now() - boss.lastFire > 750) {
                                const dx = player.x - boss.x;
                                const dy = player.y - boss.y;
                                for (let i = -2; i <= 2; i++) {
                                    const a = Math.atan2(dy, dx) + i * 0.22;
                                    fire(Math.cos(a) * 600, Math.sin(a) * 600);
                                }
                                boss.lastFire = performance.now();
                            } else if (boss.attackPattern === 3 && boss.name === 'GHOST SIGNAL' && performance.now() - boss.lastFire > 3000) {
                                const dx = player.x - boss.x;
                                const dy = player.y - boss.y;
                                for (let i = -1; i <= 1; i++) {
                                    const a = Math.atan2(dy, dx) + i * 0.25;
                                    enemyBullets.push({
                                        x: boss.x,
                                        y: boss.y,
                                        baseVx: Math.cos(a) * 350,
                                        baseVy: Math.sin(a) * 350,
                                        vx: Math.cos(a) * 350,
                                        vy: Math.sin(a) * 350,
                                        char: 'z',
                                        color: '#00ffff',
                                        isZigZag: true,
                                        zigTimer: 0,
                                        zigDir: 1
                                    });
                                }
                                boss.lastFire = performance.now();
                            }
                        }
                    }

                    if (maybeTriggerBossDeathCinematic(boss)) return;
                }
            }

            // Projectiles
            for (let i = comboProjectiles.length - 1; i >= 0; i--) {
                const p = comboProjectiles[i];
                p.life -= dt;
                
                if (p.stats.homing) {
                    let nearest = null, minDistSq = Infinity;
                    enemies.concat(boss && boss.phase === 'ACTIVE' ? [boss] : []).forEach(e => {
                        const dx = e.x - p.x, dy = e.y - p.y;
                        const dSq = dx*dx + dy*dy;
                        if (dSq < minDistSq) { minDistSq = dSq; nearest = e; }
                    });
                    if (nearest) {
                        const dx = nearest.x - p.x, dy = nearest.y - p.y, dist = Math.sqrt(minDistSq);
                        const steerStr = 3000 * dt;
                        p.baseVx += (dx / dist) * steerStr;
                        p.baseVy += (dy / dist) * steerStr;
                        const speed = Math.sqrt(p.baseVx*p.baseVx + p.baseVy*p.baseVy);
                        const desiredSpeed = 1400 * p.stats.speedMult;
                        p.baseVx = (p.baseVx / speed) * desiredSpeed;
                        p.baseVy = (p.baseVy / speed) * desiredSpeed;
                    }
                }
                
                if (p.stats.pathFunction === 'sine') {
                    let t = p.maxLife - p.life;
                    let perpX = -p.baseVy / (1400 * p.stats.speedMult);
                    let perpY = p.baseVx / (1400 * p.stats.speedMult);
                    let linearX = p.startX + p.baseVx * t;
                    let linearY = p.startY + p.baseVy * t;
                    let offset = Math.sin(t * 15) * 40;
                    p.x = linearX + perpX * offset;
                    p.y = linearY + perpY * offset;
                } else {
                    p.x += p.baseVx * dt; 
                    p.y += p.baseVy * dt;
                }
                
                applyWakeForce(p.x, p.y, 45, 6);
                
                let hit = false;
                let hitboxRadius = 20 * p.stats.sizeMult;
                if (p.stats.pathFunction === 'parabolic') hitboxRadius *= 1.5;

                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    if (!e.onScreen) continue;
                    if (p.pierceHits.includes(e)) continue;
                    
                    if (Math.abs(p.x - e.x) < hitboxRadius + 20 && Math.abs(p.y - e.y) < hitboxRadius + 20) {
                        e.hp -= p.damage;
                        p.pierceHits.push(e);
                        
                        if (p.stats.splashRadius > 0) {
                            radialExplosion(p.x, p.y, p.stats.splashRadius * 22, p.damage * p.stats.splashDamagePercent);
                            if (bossCinematic && bossCinematic.paused) return;
                        }
                        
                        if (p.stats.chainCount > 0) {
                            let nearest = null, minDist = Infinity;
                            enemies.forEach(other => {
                                if (other === e) return;
                                let distSq = (other.x - e.x)**2 + (other.y - e.y)**2;
                                if (distSq < 150*150 && distSq < minDist) { minDist = distSq; nearest = other; }
                            });
                            if (nearest) {
                                comboProjectiles.push({
                                    x: e.x, y: e.y,
                                    vx: (nearest.x - e.x) * 5, vy: (nearest.y - e.y) * 5,
                                    baseVx: (nearest.x - e.x) * 5, baseVy: (nearest.y - e.y) * 5,
                                    startX: e.x, startY: e.y,
                                    sprite: '⚡', color: '#00ffff',
                                    stats: { ...p.stats, chainCount: p.stats.chainCount - 1, splashRadius: 0 },
                                    life: 0.5, maxLife: 0.5, damage: p.damage * 0.5,
                                    pierceHits: [e], pierceCount: 0
                                });
                            }
                        }

                        for (let k = 0; k < 6 + Math.floor(Math.random() * 3); k++) {
                            const ang = Math.random() * Math.PI * 2; const spd = 60 + Math.random() * 40;
                            debris.push({ x: p.x, y: p.y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd, char: ['·', '∙', '•', '░'][Math.floor(Math.random()*4)], color: ['#888888', '#666666', '#999999', '#aaaaaa'][Math.floor(Math.random()*4)], life: 0.2, isImpact: true });
                        }
                        if (e.hp <= 0) {
                            explodeEnemy(e); enemies.splice(j, 1);
                        } else {
                            e.flashTimer = 0.15;
                        }
                        
                        if (p.pierceCount-- <= 0) { hit = true; break; }
                    }
                }
                if (!hit && boss && boss.phase === 'ACTIVE' && !p.pierceHits.includes(boss)) {
                    let hitBoss = false;
                    if (boss.name === 'OVERHEATING FIREWALL') {
                        if (boss.isVulnerable && Math.abs(p.x - boss.x) < 80 && Math.abs(p.y - (boss.y + 20)) < 80) {
                            boss.hp -= p.damage;
                            hitBoss = true;
                        } else if (!boss.isVulnerable && Math.abs(p.x - boss.x) < 120 && Math.abs(p.y - boss.y) < 120) {
                            hit = true;
                        }
                    } else if (Math.abs(p.x - boss.x) < 120 && Math.abs(p.y - boss.y) < 90) {
                        if (!boss.isDeadGlitching) {
                            boss.hp -= p.damage;
                            hitBoss = true;
                        } else hit = true;
                    }
                    if (hitBoss) {
                        p.pierceHits.push(boss);
                        boss.flashTimer = 0.15;
                        if (maybeTriggerBossDeathCinematic(boss)) return;
                        if (p.stats.splashRadius > 0) {
                            radialExplosion(p.x, p.y, p.stats.splashRadius * 22, p.damage * p.stats.splashDamagePercent);
                            if (bossCinematic && bossCinematic.paused) return;
                        }
                        for (let k = 0; k < 6 + Math.floor(Math.random() * 3); k++) {
                            const ang = Math.random() * Math.PI * 2; const spd = 60 + Math.random() * 40;
                            debris.push({ x: p.x, y: p.y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd, char: ['·', '∙', '•', '░'][Math.floor(Math.random()*4)], color: ['#888888', '#666666', '#999999', '#aaaaaa'][Math.floor(Math.random()*4)], life: 0.2, isImpact: true });
                        }
                        if (p.pierceCount-- <= 0) hit = true;
                    }
                }
                if (hit || p.life <= 0 || p.y < -60 || p.y > height + 60 || p.x < -60 || p.x > width + 60) {
                    if (p.stats.pathFunction === 'parabolic') {
                        radialExplosion(p.x, p.y, p.stats.splashRadius * 22, p.damage * p.stats.splashDamagePercent);
                        if (bossCinematic && bossCinematic.paused) return;
                    }
                    comboProjectiles.splice(i, 1);
                }
            }

            if (enemies.length === 0 && !boss) {
                if (WaveManager.waveDelay > 0) {
                    WaveManager.waveDelay -= dt;
                } else {
                    WaveManager.spawn();
                }
            }
            
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                if (!e.onScreen && e.y > 0) e.onScreen = true;
                if (e.flashTimer > 0) e.flashTimer -= dt;
                
                if (e.isFlameGuardian) {
                    e.color = frameCount % 40 < 20 ? '#e38914' : '#e01926';
                    
                    if (Math.random() > 0.6) {
                        thrusterParticles.push({
                            x: e.x + (Math.random() - 0.5) * 20, y: e.y - 20,
                            vx: (Math.random() - 0.5) * 45, vy: -60 - Math.random() * 40,
                            char: ['^', '*', '░', '▒'][Math.floor(Math.random() * 4)],
                            color: null, life: 1.0, isGuardianFlame: true
                        });
                    }

                    e.fireTimer += dt;
                    if (e.fireTimer > 2.5) {
                        e.fireTimer = 0;
                        const dx = player.x - e.x, dy = player.y - e.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        enemyBullets.push({ x: e.x, y: e.y, vx: (dx/dist)*250, vy: (dy/dist)*250, char: '❋', color: '#e38914', isLargeFlame: true });
                    }
                    
                    // Allow Flame Guardian to follow path if one exists
                    if (!e.path) {
                        if (Math.abs(e.x - e.hoverX) > 5) e.x += e.vx * dt;
                        else e.vx = 0;
                        continue;
                    }
                }
                
                if (e.path) {
                    let spd = e.speedMult;
                    if (e.pathTypeWave === 'wave8') {
                        if (e.pathIndex < 4) spd *= 1.5; 
                        else if (e.pathIndex < 8) spd *= 1.2; 
                    }
                    const segTime = 10 / e.path.length; e.pathT += (dt / segTime) * spd;
                    if (e.pathT >= 1) { e.pathIndex = (e.pathIndex + 1) % e.path.length; e.pathT -= 1; }
                    if (e.pathT < 0) { e.x = e.path[0].x * width; e.y = e.path[0].y * height; }
                    else {
                        const p1 = e.path[e.pathIndex], p2 = e.path[(e.pathIndex + 1) % e.path.length];
                        const oldX = e.x, oldY = e.y;
                        e.x = (p1.x + (p2.x - p1.x) * e.pathT) * width; e.y = (p1.y + (p2.y - p1.y) * e.pathT) * height;
                        e.vx = (e.x - oldX) / dt; e.vy = (e.y - oldY) / dt;
                    }
                } else if (e.pathType) {
                    e.lifeTime += dt;
                    if (e.lifeTime > 0) {
                        let nx = e.x, ny = e.y;
                        const t = e.lifeTime;
                        if (e.pathType === 'weave') {
                            ny += 120 * dt * e.speedMult;
                            nx = e.startX + Math.sin(t * 3.5) * 150;
                        } else if (e.pathType === 'spiral') {
                            const r = Math.max(0, 450 - t * 45 * e.speedMult);
                            const theta = t * 2 + e.indexOffset;
                            nx = width/2 + r * Math.cos(theta);
                            ny = height/3 + r * Math.sin(theta);
                        } else if (e.pathType === 'horizontalDrop') {
                            if (t < 2.5) {
                                nx += (e.startX < width/2 ? 180 : -180) * dt * e.speedMult;
                            } else {
                                ny += 250 * dt * e.speedMult;
                            }
                        } else if (e.pathType === 'erraticScatter') {
                            if (t < 1) {
                                ny += 150 * dt;
                            } else if (t < 1.1) {
                                if (!e.scatterSet) {
                                    e.scatterVx = (Math.random() - 0.5) * 800;
                                    e.scatterVy = (Math.random() - 0.5) * 800;
                                    e.scatterSet = true;
                                }
                            } else {
                                nx += e.scatterVx * dt;
                                ny += e.scatterVy * dt;
                                if (nx < 20 || nx > width - 20) e.scatterVx *= -1;
                                if (ny < 20 || ny > height/2) e.scatterVy *= -1;
                            }
                        }
                        
                        e.vx = nx - e.x; e.vy = ny - e.y;
                        e.x = nx; e.y = ny;
                    }
                } else {
                    e.y += e.vy * dt; 
                }
                
                if (e.y > height + 100) enemies.splice(i, 1);
            }
            
            for (let i = drops.length - 1; i >= 0; i--) {
                const d = drops[i]; 
                
                if (d.isWeapon) {
                    // Magnet effect
                    const dx = player.x - d.x, dy = player.y - d.y;
                    const distSq = dx * dx + dy * dy;
                    const magnetRangeSq = 22500 * (1 + player.modifiers.magnet);
                    if (distSq < magnetRangeSq) {
                        const dist = Math.sqrt(distSq);
                        d.vx = (dx / dist) * 150;
                        d.vy = (dy / dist) * 150;
                    } else {
                        d.vx *= 0.95; // Dampen horizontal drift when outside magnet range
                        d.vy = 30;    // Steady downward drift
                    }

                    d.y += d.vy * dt; 
                    d.x += (d.vx || 0) * dt;

                    d.cycleTimer += dt;
                    if (d.cycleTimer >= 0.75) {
                        d.cycleTimer -= 0.75;
                        d.currentIndex = (d.currentIndex + 1) % 3;
                    }

                    if (distSq < 2500) { // ~50px collection radius
                        let chosen = d.options[d.currentIndex];
                        applyWeapon(chosen);
                        if (player.weapons.length < 9) player.weapons.push(chosen);
                        weaponWeights[chosen.name] *= 0.5;
                        addShake(15);
                        for(let k=0; k<20; k++) {
                            let a = Math.random() * Math.PI * 2;
                            let spd = 50 + Math.random() * 150;
                            debris.push({
                                x: d.x, y: d.y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
                                char: '+', color: chosen.color, life: 1.0
                            });
                        }
                        drops.splice(i, 1);
                    } else if (d.y > height + 80) {
                        drops.splice(i, 1);
                    }
                } else {
                    d.y += d.vy * dt; 
                    d.x += (d.vx || 0) * dt;

                    if (d.y > height - 30) {
                        d.y = height - 30;
                        d.vy = 0;
                        d.vx = Math.sin(Date.now() * 0.002) * 30;
                    }
                    
                    const dx = d.x - player.x, dy = d.y - player.y;
                    if (dx * dx + dy * dy < 3600) { 
                        if (d.isHealth) player.hp = Math.min(player.maxHp, player.hp + Math.ceil(player.maxHp * 0.10));
                        drops.splice(i, 1); addShake(20);
                    } else if (d.y > height + 60) drops.splice(i, 1);
                }
            }
            
            for (let i = debris.length - 1; i >= 0; i--) { 
                const d = debris[i]; d.x += d.vx * dt; d.y += d.vy * dt; d.vx *= 0.98; d.vy *= 0.98; d.life -= dt * 0.9; 
                if (d.life <= 0) debris.splice(i, 1); 
            }
            shake *= 0.88;
        }

        function drawPauseMenu() {

            const midX = width / 2;
            const lFrame = [..."⣠⣄⡆⠇⠋⠙⠸⢰"][Math.floor(Date.now() / 160) % 8];

                    'GLOW EFFECT: < ' + (glowEnabled ? 'ON' : 'OFF') + ' >',
                    'CRT FILTER: < ' + (crtFilterEnabled ? 'ON' : 'OFF') + ' >',
                    'GO BACK'
                ];
                options.forEach((opt, i) => {
                    const isSel = settingsSelection === i;

                        ctx.shadowBlur = 15;

                        const textW = ctx.measureText(opt).width;
                        
                        ctx.font = `bold 28px Courier New`;

                    }
                    
                    ctx.font = `bold 28px 'Electrolize', sans-serif`;
                    ctx.fillText(opt, midX | 0, (midY + i * 80) | 0);
                    ctx.shadowBlur = 0;
                });
            }
        }

        function drawCard(x, y, w, h, opt, isSelected, alpha) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';
            const borderPulse = isSelected ? (Math.sin(performance.now() * 0.006) + 1) * 0.5 : 0;

            const scale = isSelected ? 1.08 : 1.0;
            const cx = x + w / 2;
            const cy = y + h / 2;
            ctx.translate(cx, cy);
            ctx.scale(scale, scale);
            ctx.translate(-w / 2, -h / 2);

            ctx.fillStyle = '#0a0a15';
            ctx.fillRect(0, 0, w, h);

            ctx.fillStyle = isSelected ? `${opt.color}11` : 'rgba(255,255,255,0.02)';
            ctx.fillRect(8, 8, w - 16, h - 16);

            if (isSelected) {
                ctx.shadowColor = opt.color;
                ctx.shadowBlur = 10 + borderPulse * 10;
            }
            ctx.strokeStyle = opt.color;
            ctx.lineWidth = isSelected ? 3 : 1;
            ctx.strokeRect(0, 0, w, h);
            if (isSelected) {
                ctx.globalAlpha = alpha * (0.2 + borderPulse * 0.18);
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(4, 4, w - 8, h - 8);
            }
            ctx.globalAlpha = alpha;
            ctx.shadowBlur = 0;

            ctx.fillStyle = opt.color;
            ctx.font = `bold 16px 'Electrolize', sans-serif`;
             
            let words = opt.displayName.split(' '); 
            let lines = []; 
            let currentLine = words[0];
            for (let i = 1; i < words.length; i++) { 
                if (ctx.measureText(currentLine + " " + words[i]).width < w - 20) {
                    currentLine += " " + words[i]; 
                } else { 
                    lines.push(currentLine); 
                    currentLine = words[i]; 
                } 
            } 
            lines.push(currentLine);
             
            let ly = 40; 
            lines.forEach(line => { 
                ctx.fillText(line, w / 2, ly); ly += 20; 
            });
             
            ctx.fillStyle = currentThemeColor; 
            ctx.font = `14px 'Electrolize', sans-serif`; 
            ctx.fillText(`[${opt.cat}]`, w / 2, ly + 20);
             
            ctx.fillStyle = '#ffffff'; 
            let descWords = opt.desc.split(' '); 
            let descLine = ''; 
            let descLy = ly + 60;
            for(let n = 0; n < descWords.length; n++) { 
                let testLine = descLine + descWords[n] + ' '; 
                if (ctx.measureText(testLine).width > w - 20 && n > 0) { 
                    ctx.fillText(descLine, w / 2, descLy); 
                    descLine = descWords[n] + ' '; descLy += 20; 
                } else {
                    descLine = testLine; 
                }
            } 
            ctx.fillText(descLine, w / 2, descLy);
             
            ctx.fillStyle = opt.color; 
            ctx.font = `bold 18px Courier New`;
            let valStr;
            if (opt.type === 'multiplicative') valStr = `-${((1 - opt.value) * 100).toFixed(0)}%`;
            else if (opt.id === 'repair') valStr = `+${opt.value.toFixed(1)}/s`;
            else if (opt.id === 'shield') valStr = `+${opt.value.toFixed(2)}s`;
            else if (opt.id === 'target') valStr = `+${opt.value.toFixed(0)} DMG`;
            else valStr = `+${(opt.value * 100).toFixed(0)}%`;
            ctx.fillText(valStr, w / 2, h - 25);
            ctx.restore();
        }

        function drawLevelUpMenu(dt) {
            ctx.fillStyle = currentBgColor + 'dd'; 
            ctx.fillRect(0, 0, width | 0, height | 0);
            ctx.fillStyle = currentThemeColor; 
            ctx.font = `bold 32px 'Electrolize', sans-serif`; 
            ctx.fillText(`LEVEL UP: ${player.level}`, (width / 2) | 0, (height * 0.15) | 0);
            
            if (levelUpState === 'OFFERING') {
                offeredOptions.forEach((opt, i) => { 
                    let cx = width * (0.2 + i * 0.3); 
                    let cy = height * 0.5; 
                    drawCard(cx - 90, cy - 130, 180, 260, opt, selectedOptionIndex === i, 1.0); 
                });
            } else if (levelUpState === 'ANIMATING') {
                levelUpTimer += dt; 
                let t = levelUpTimer / 0.7;
                offeredOptions.forEach((opt, i) => {
                    let startX = width * (0.2 + i * 0.3); 
                    let startY = height * 0.5;
                    if (i === selectedOptionIndex) {
                        let cx = startX + (width/2 - startX) * Math.min(1, t * 2); 
                        let flashAlpha = t > 0.8 ? 1 - (t - 0.8) * 5 : 0;
                        drawCard(cx - 90, startY - 130, 180, 260, opt, true, 1.0 - Math.max(0, (t - 0.8) * 5));
                        if (flashAlpha > 0) { 
                            ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`; 
                            ctx.fillRect(cx - 90, startY - 130, 180, 260); 
                        }
                    } else { 
                        drawCard(startX - 90, startY - 130, 180, 260, opt, false, Math.max(0, 1 - t * 5)); 
                    }
                });
                if (levelUpTimer > 0.7) { 
                    applyPowerup(offeredOptions[selectedOptionIndex]); 
                    gameState = 'PLAYING'; 
                    if (!isMuted) gainNode.gain.value = currentVolume;
                }
            }
        }

        function draw(dt) {
            ctx.fillStyle = currentBgColor; 
            ctx.fillRect(0, 0, width | 0, height | 0);
            if (window.innerHeight < 500 || window.innerWidth < 350) {
                ctx.fillStyle = currentThemeColor; ctx.font = 'bold 24px Courier New';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('RESIZE WINDOW TO PLAY', (width / 2) | 0, (height / 2) | 0);
                return;
            }
            ctx.save(); 
            if (shake > 0.5) ctx.translate(((Math.random()-0.5)*shake) | 0, ((Math.random()-0.5)*shake) | 0);
            if (wobble > 0.01) { ctx.translate(Math.sin(Date.now() * 0.08) * wobble * 6, 0); wobble *= 0.82; }
            
            ctx.globalCompositeOperation = 'source-over'; 

            // Background Geometric Field
            for (let i = 0; i < numParticles; i++) {
                if (fpY[i] < -CELL_SIZE || fpY[i] > height + CELL_SIZE) continue;
                const char = PARTICLE_CHARS[fpChar[i]];
                const baseColor = COLORS[fpColor[i]];
                if (fpHighlight[i] > 0.1) {
                    ctx.fillStyle = '#ffffff'; ctx.globalAlpha = fpHighlight[i];
                    ctx.fillRect((fpX[i]-charW/2) | 0, (fpY[i]-charH/2) | 0, charW, charH);
                    ctx.fillStyle = currentThemeColor; ctx.globalAlpha = 1.0;
                } else {
                    ctx.fillStyle = baseColor; ctx.globalAlpha = fpAlpha[i];
                }
                ctx.fillText(char, fpX[i] | 0, fpY[i] | 0);
            }
            ctx.globalAlpha = 1.0;

            if (gameState === 'START' || gameState === 'LAUNCHING') {
                let alpha = titleAlpha;
                if (gameState === 'LAUNCHING') {
                    alpha = Math.max(0, titleAlpha - (launchTimer / 0.5));
                }

                if (alpha > 0) {
                    ctx.globalAlpha = alpha;
                    const LOGO =    ["  ___   ____   _____  _____  _____ ",
                                    " / _ \\ / ___| /  ___||_   _||_   _|",
                                    "/ /_\\ \\\\___ \\ | |      | |    | |  ",
                                    "|  _  | ___) || |___  _| |_  _| |_ ",
                                    "|_| |_||____/ \\____/ |_____||_____|",
                                    "                                   ",
                                    "  ___   _____  _____  _      _____  _   _  _____  _____ ",
                                    " / _ \\ |_   _||  _  || |    |_   _|| \\ | ||  ___|/  ___|",
                                    "/ /_\\ \\  | |  | |_) || |      | |  |  \\| || |__  \\ `--. ",
                                    "|  _  |  | |  |  _  /| |      | |  | . ` ||  __|  `--. \\",
                                    "| | | | _| |_ | | \\ \\| |____ _| |_ | |\\  || |___ /\\__/ /",
                                    "\\_| |_/ \\___/ \\_|  \\_\\\\____/ \\___/ \\_| \\_/\\____/ \\____/ "];

                    ctx.font = `bold ${FONT_SIZE}px Courier New`;
                    const logoY = height * 0.25;
                    for (let i = 0; i < LOGO.length; i++) {
                        const t = i / LOGO.length;
                        const r = Math.floor(255 * (1 - t));
                        const b = 255;
                        const g = Math.floor(255 * t);
                        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                        ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 10;
                        ctx.fillText(LOGO[i], (width / 2) | 0, (logoY + i * charH) | 0);
                    }
                    ctx.shadowBlur = 0;
                    if (Math.floor(Date.now()/500)%2) { 
                        ctx.fillStyle = '#ffffff'; 
                        ctx.font = `bold 20px 'Electrolize', sans-serif`; 
                        ctx.fillText('PRESS [SPACE] TO TAKE OFF', (width/2) | 0, (height*0.6) | 0); 
                    }
                    ctx.fillStyle = currentThemeColor; 
                    ctx.font = `14px 'Electrolize', sans-serif`; 
                    ctx.fillText('WASD to Maneuver | Auto-Fire | SPACE to Bomb', (width/2) | 0, (height*0.7) | 0);
                    ctx.globalAlpha = 1.0;
                }

                if (gameState === 'LAUNCHING') {
                    const pulseVisuals = getPlayerPulseVisuals();
                    player.color = pulseVisuals.color;

                    ctx.globalCompositeOperation = 'source-over';
                    ctx.fillStyle = player.color;
                    ctx.shadowColor = currentThemeColor;
                    ctx.shadowBlur = pulseVisuals.glow;
                    drawPlayerShip(player, 'center');
                    ctx.shadowBlur = 0;
                    ctx.globalCompositeOperation = 'source-over';

                    for (const t of thrusterParticles) { 
                        ctx.fillStyle = t.isSmoke ? t.color : (t.isGuardianFlame ? getGuardianFlameColor(t.life) : getExhaustColor(t.life)); 
                        ctx.globalAlpha = t.life; 
                        ctx.font = t.isGuardianFlame ? `bold 26px Courier New` : `bold ${FONT_SIZE}px Courier New`;
                        ctx.fillText(t.char, t.x | 0, t.y | 0); 
                    }
                    ctx.globalAlpha = 1.0;
                }
            } else if (gameState === 'GAMEOVER') {
                ctx.fillStyle = '#ff0088'; ctx.font = `bold 44px 'Electrolize', sans-serif`; ctx.fillText('YOU DIED', (width/2) | 0, (height/2 - 40) | 0);
                ctx.fillStyle = '#ffffff'; ctx.font = `22px 'Electrolize', sans-serif`; ctx.fillText('PRESS [SPACE] TO RETRY', (width/2) | 0, (height/2 + 20) | 0);
                
                ctx.fillStyle = '#ffaa00'; ctx.font = `18px 'Electrolize', sans-serif`; 
                ctx.fillText(currentHint, (width/2) | 0, (height/2 + 80) | 0);
            } else {
                for (const t of thrusterParticles) { 
                    ctx.fillStyle = t.isSmoke ? t.color : (t.isGuardianFlame ? getGuardianFlameColor(t.life) : getExhaustColor(t.life)); 
                    ctx.globalAlpha = t.life; 
                    ctx.font = t.isGuardianFlame ? `bold 26px Courier New` : `bold ${FONT_SIZE}px Courier New`;
                    ctx.fillText(t.char, t.x | 0, t.y | 0); 
                }
                ctx.globalAlpha = 1.0;
                for (const o of xpOrbs) { ctx.fillStyle = '#ffffff'; ctx.font = `bold 20px Courier New`; ctx.fillText(o.char, o.x | 0, o.y | 0); }
                for (const d of drops) { 
                    if (d.isWeapon) {
                        let activeWp = d.options[d.currentIndex];
                        ctx.globalAlpha = 1.0;
                        ctx.shadowColor = activeWp.color;
                        ctx.shadowBlur = 15 + 10 * Math.sin(Date.now() * 0.01);
                        ctx.strokeStyle = activeWp.color;
                        ctx.lineWidth = 3;
                        ctx.strokeRect((d.x - 30)|0, (d.y - 30)|0, 60, 60);

                        ctx.fillStyle = '#ffffff';
                        ctx.font = 'bold 40px Courier New';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(activeWp.glyph, d.x|0, d.y|0);

                        ctx.font = 'bold 12px "Electrolize", sans-serif';
                        ctx.fillStyle = activeWp.color;
                        ctx.fillText(activeWp.name.toUpperCase(), d.x|0, (d.y + 45)|0);

                        ctx.shadowBlur = 0;
                        ctx.globalAlpha = 1.0;
                    } else {
                        ctx.fillStyle = d.color; 
                        ctx.globalAlpha = d.y >= height - 30 ? 0.75 + Math.sin(Date.now() * 0.005) * 0.25 : 1.0;
                        ctx.font = d.isHealth ? `bold 32px Courier New` : `bold 22px Courier New`; 
                        ctx.fillText(d.char, d.x | 0, d.y | 0); 
                    }
                }
                ctx.globalAlpha = 1.0;
                
                let hugeFontSet = false;
                for (const b of enemyBullets) { 
                    if (b.isHuge) {
                        if (!hugeFontSet) {
                            ctx.font = `bold 120px Courier New`;
                            hugeFontSet = true;
                        }
                        ctx.fillStyle = b.color;
                        if (b.isGlitchBullet && glowEnabled) { ctx.shadowColor = '#00ff41'; ctx.shadowBlur = 25; }
                        const scale = Math.max(0.01, b.life);
                        ctx.save();
                        ctx.translate(b.x | 0, b.y | 0);
                        ctx.scale(scale, scale);
                        ctx.fillText(b.char, 0, 0);
                        ctx.restore();
                        if (b.isGlitchBullet) { ctx.shadowBlur = 0; }
                        continue;
                    }
                    if (b.isLargeFlame) {
                        // Mini flame trail particles
                        if (Math.random() > 0.4) {
                            thrusterParticles.push({
                                x: b.x + (Math.random() - 0.5) * 10, y: b.y + (Math.random() - 0.5) * 10,
                                vx: (Math.random() - 0.5) * 30, vy: -30 - Math.random() * 25,
                                char: ['^', '*', '░'][Math.floor(Math.random() * 3)],
                                color: null, life: 0.7, isGuardianFlame: true
                            });
                        }
                        // Fade between red and orange
                        const flameCycle = Math.sin(performance.now() * 0.004);
                        b.color = flameCycle > 0 ? '#e01926' : '#e38914';
                    }
                    if (b.isCodeLine) {
                        ctx.fillStyle = '#00ff41';
                        ctx.font = `bold 14px Courier New`;
                        if (glowEnabled) { ctx.shadowColor = '#00ff41'; ctx.shadowBlur = 20 + Math.random() * 10; }
                        ctx.save();
                        ctx.translate(b.x | 0, b.y | 0);
                        ctx.rotate(Math.atan2(b.vy, b.vx));
                        ctx.fillText(b.char, 0, 0);
                        ctx.restore();
                        ctx.shadowBlur = 0;
                        continue;
                    }
                    ctx.fillStyle = b.color;
                    if (b.decay) ctx.font = `bold ${Math.max(1, Math.floor(24 * b.life))}px Courier New`;
                    else if (b.isLargeFlame) ctx.font = `bold 32px Courier New`;
                    else if (b.isPhantomBullet) ctx.font = `bold 35px Courier New`;
                    else ctx.font = `bold 20px Courier New`;
                    if (b.isGlitchBullet && glowEnabled) {
                        ctx.shadowColor = '#00ff41';
                        ctx.shadowBlur = 18 + Math.random() * 8;
                    }
                    ctx.fillText(b.char, b.x | 0, b.y | 0);
                    if (b.isGlitchBullet) { ctx.shadowBlur = 0; }
                }
                if (hugeFontSet) {
                    ctx.font = `bold 20px Courier New`; // Restore standard font size
                }
                
                for (const e of enemies) {
                    if (e.path && e.pathT < 0) continue;
                    if (e.lifeTime && e.lifeTime < 0) continue;
                    ctx.fillStyle = e.flashTimer > 0 ? '#ffffff' : e.color;
                    ctx.font = `bold 20px Courier New`;
                    const eSX = e.x - (e.sprite[0].length * charW)/2, eSY = e.y - (e.sprite.length * charH)/2;

        function mixColor(colorA, colorB, t) {
            const clamped = Math.max(0, Math.min(1, t));
            const a = colorA.replace('#', '');
            const b = colorB.replace('#', '');
            const ar = parseInt(a.slice(0, 2), 16), ag = parseInt(a.slice(2, 4), 16), ab = parseInt(a.slice(4, 6), 16);
            const br = parseInt(b.slice(0, 2), 16), bg = parseInt(b.slice(2, 4), 16), bb = parseInt(b.slice(4, 6), 16);
            const r = Math.round(ar + (br - ar) * clamped);

            const bl = Math.round(ab + (bb - ab) * clamped);
            return `rgb(${r}, ${g}, ${bl})`;
        }

            const clamped = Math.max(0, Math.min(1, alpha));

                const hex = color.replace('#', '');
                const r = parseInt(hex.slice(0, 2), 16);
                const g = parseInt(hex.slice(2, 4), 16);
                const b = parseInt(hex.slice(4, 6), 16);
                return `rgba(${r}, ${g}, ${b}, ${clamped})`;
            }
            const rgbMatch = color.match(/rgba?\(([^)]+)\)/i);
            if (rgbMatch) {
                const parts = rgbMatch[1].split(',').map(part => parseFloat(part.trim()));
                const [r = 255, g = 255, b = 255] = parts;
                return `rgba(${r}, ${g}, ${b}, ${clamped})`;
            }
            return color;
