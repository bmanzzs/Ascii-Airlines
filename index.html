<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascii Airlines</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Electrolize&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-color: #00ffff;
            --theme-bg: #050510;
            --theme-shadow: 0 0 5px #00ffff;
            --theme-fps: #888888;
            --hud-height: 68px;
            --hud-ui-scale: 1;
            --hud-weapon-cell: 12px;
        }
        body, html {
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', Courier, monospace;

        }
        canvas {
            display: block;
            border: 2px solid var(--theme-color);
            image-rendering: pixelated;
        }
        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #hud {
            width: 100%;
            min-width: 0;
            height: var(--hud-height);
            background: var(--theme-bg);
            border: 2px solid var(--theme-color);
            border-top: none;
            color: var(--theme-color);
            font-family: 'Electrolize', 'Courier New', sans-serif;
            font-size: calc(11px * var(--hud-ui-scale));
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: calc(12px * var(--hud-ui-scale));
            padding: calc(4px * var(--hud-ui-scale)) calc(12px * var(--hud-ui-scale));
            box-sizing: border-box;
            text-shadow: var(--theme-shadow);
            box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.2);
            pointer-events: none;
            overflow: hidden;
        }
        #hud > * {
            min-width: 0;
        }
        .hud-left,
        .hud-right {
            min-width: 0;
            display: flex;
            align-items: center;
        }
        .hud-left {
            flex: 0 0 auto;
            gap: calc(14px * var(--hud-ui-scale));
        }
        .hud-right {
            flex: 0 0 auto;
            margin-left: auto;
            justify-content: flex-end;
            gap: calc(14px * var(--hud-ui-scale));
        }
        .hud-score {
            flex: 0 0 calc(112px * var(--hud-ui-scale));
            min-width: calc(112px * var(--hud-ui-scale));
            display: flex;
            flex-direction: column;
            gap: calc(2px * var(--hud-ui-scale));
            white-space: nowrap;
        }
        .hud-score-label,
        .hud-meter-label {
            font-size: calc(9px * var(--hud-ui-scale));
            line-height: 1;
            letter-spacing: 0.05em;
            opacity: 0.92;
        }
        .hud-score-value {
            line-height: 1;
            font-size: calc(17px * var(--hud-ui-scale));
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum" 1;
        }
        .hud-meters {
            min-width: 0;
            display: grid;
            grid-template-columns: repeat(3, max-content);
            gap: calc(12px * var(--hud-ui-scale));
            align-items: end;
        }
        .hud-meter {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: calc(2px * var(--hud-ui-scale));
            align-items: flex-start;
        }
        .hud-meter-bar {
            font-family: 'Courier New', Courier, monospace;
            font-size: calc(12px * var(--hud-ui-scale));
            line-height: 1;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            --fill-alpha: 0.4;
        }
        .hud-bar-block {
            display: inline-block;
        }
        .hud-bar-block-filled {
            opacity: calc(0.38 + var(--fill-alpha) * 0.62);
            will-change: opacity, filter, transform;
        }
        .hud-meter-bar.is-xp .hud-bar-block-filled {
            animation: hud-meter-shimmer 1.05s ease-in-out infinite;
            animation-delay: calc(var(--bar-idx, 0) * 58ms);
        }
        .hud-meter-bar.is-hp .hud-bar-block-filled {
            animation: hud-meter-shimmer-soft 1.65s ease-in-out infinite;
            animation-delay: calc(var(--bar-idx, 0) * 72ms);
        }
        .hud-meter-bar.is-bomb-ready .hud-bar-block-filled {
            animation: hud-meter-shimmer-hot 0.68s ease-in-out infinite;
            animation-delay: calc(var(--bar-idx, 0) * 46ms);
        }
        @keyframes hud-meter-shimmer {
            0%, 100% {
                opacity: calc(0.42 + var(--fill-alpha) * 0.58);
                filter: brightness(1);
                transform: translateY(0) scale(1);
            }
            45% {
                opacity: calc(0.52 + var(--fill-alpha) * 0.72);
                filter: brightness(calc(1.12 + var(--fill-alpha) * 0.22));
                transform: translateY(-0.5px) scale(1.01);
            }
            60% {
                opacity: calc(0.62 + var(--fill-alpha) * 0.82);
                filter: brightness(calc(1.22 + var(--fill-alpha) * 0.35));
                transform: translateY(-1px) scale(1.03);
            }
        }
        @keyframes hud-meter-shimmer-soft {
            0%, 100% {
                opacity: calc(0.46 + var(--fill-alpha) * 0.5);
                filter: brightness(1);
                transform: translateY(0) scale(1);
            }
            50% {
                opacity: calc(0.56 + var(--fill-alpha) * 0.6);
                filter: brightness(calc(1.08 + var(--fill-alpha) * 0.18));
                transform: translateY(-0.5px) scale(1.01);
            }
        }
        @keyframes hud-meter-shimmer-hot {
            0%, 100% {
                opacity: 0.84;
                filter: brightness(1.05);
                transform: translateY(0) scale(1);
            }
            38% {
                opacity: 1;
                filter: brightness(1.45);
                transform: translateY(-1px) scale(1.04);
            }
            58% {
                opacity: 0.92;
                filter: brightness(1.85);
                transform: translateY(-1.6px) scale(1.08);
            }
        }
        .hud-weapon-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hud-weapon-grid {
            display: grid;
            grid-template-columns: repeat(5, var(--hud-weapon-cell));
            grid-template-rows: repeat(2, var(--hud-weapon-cell));
            gap: calc(2px * var(--hud-ui-scale));
            padding: calc(4px * var(--hud-ui-scale));
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.08);
        }
        .hud-weapon-cell {
            width: var(--hud-weapon-cell);
            height: var(--hud-weapon-cell);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(var(--hud-weapon-cell) - 1px);
            font-family: 'Courier New', Courier, monospace;
        }
        .hud-status {
            display: flex;
            align-items: center;
            gap: calc(6px * var(--hud-ui-scale));
            white-space: nowrap;
            font-size: calc(14px * var(--hud-ui-scale));
        }
        .hud-sep {
            color: #555555;
            text-shadow: none;
            padding: 0 calc(2px * var(--hud-ui-scale));
        }
        #fps {
            position: absolute;
            top: 15px;
            right: 15px;
            color: var(--theme-fps);
            font-family: 'Electrolize', 'Courier New', sans-serif;
            font-size: clamp(6px, 0.8vw, 10px);
            font-weight: normal;
            pointer-events: none;
            text-shadow: none;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        #fps-low-perf {
            display: none;
            color: #ff0000;
            font-weight: bold;
            margin-bottom: -2px;
        }
        #firewall-wrapper {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            left: -9999px;
        }
        #crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            display: none;
            z-index: 10;
        }
        #boss-cinematic-layer {
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            opacity: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 9;
        }
        #boss-cinematic-overlay {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            image-rendering: auto;
        }
        .boss-letterbox {
            position: absolute;
            left: 0;
            width: 100%;
            background: #000;
            z-index: 2;
            pointer-events: none;
            will-change: transform;
        }
        #boss-letterbox-top {
            top: 0;
            transform: translateY(-100%);
        }
        #boss-letterbox-bottom {
            bottom: 0;
            transform: translateY(100%);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="fps">
            <div id="fps-low-perf">L</div>
            <span id="fps-val">FPS 00</span>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="boss-cinematic-layer" aria-hidden="true">
            <canvas id="boss-cinematic-overlay"></canvas>
            <div id="boss-letterbox-top" class="boss-letterbox"></div>
            <div id="boss-letterbox-bottom" class="boss-letterbox"></div>
        </div>
        <div id="hud"></div>
    </div>

    <!-- OVERHEATING FIREWALL SOURCE REMOVED 
     <pre id=p><svg onload=a=[setInterval('h="";for(a[I++*I%17+578]=i=89;i++<630;h+=i%30?"*"[a[i]=~~((a[i]+a[i+1]+a[i+29]+a[i+30])/4)]||8:"\\n")p.innerHTML=h',I=30)]></svg></pre>-->
     <!-- OVERHEATING FIREWALL SOURCE REMOVED -->

    <div id="crt-overlay"></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const hud = document.getElementById('hud');
        const fpsElement = document.getElementById('fps-val');
        const fpsLowPerf = document.getElementById('fps-low-perf');
        const bossCinematicLayer = document.getElementById('boss-cinematic-layer');
        const bossCinematicCanvas = document.getElementById('boss-cinematic-overlay');
        const bossLetterboxTop = document.getElementById('boss-letterbox-top');
        const bossLetterboxBottom = document.getElementById('boss-letterbox-bottom');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const gainNode = audioCtx.createGain();
        gainNode.gain.value = 0.4;
        gainNode.connect(audioCtx.destination);

        const bgmGain = audioCtx.createGain();
        bgmGain.connect(gainNode);
        const bossGain = audioCtx.createGain();
        bossGain.connect(gainNode);

        async function loadBuffer(url) {
            try {
                const res = await fetch(url);
                const arr = await res.arrayBuffer();
                return await audioCtx.decodeAudioData(arr);
            } catch (e) { console.error("Audio load failed:", url); return null; }
        }
        
        let buf1, buf2, bufVoidIntro, bufVoidLoop, bufGlitchIntro, bufGlitchLoop, bufBoss3Intro, bufBoss3Loop, bufBoss4Intro, bufBoss4Loop;
        let bgmSources = [];
        let bossSources = [];
        let bgmOffset = 0;
        let bgmLastStartTime = 0;
        let bgmIsPlaying = false;
        let bossMusicTimeout = null;
        let bgmRetryTimeout = null;

        async function initAudio() {
            buf1 = await loadBuffer('./audio/ascii-airlines-bg-music.mp3');
            buf2 = await loadBuffer('./audio/ascii-airlines-bg-music-loop.mp3');
            bufVoidIntro = await loadBuffer('./audio/ascii-airlines-boss1-intro.mp3');
            bufVoidLoop = await loadBuffer('./audio/ascii-airlines-boss1-loop.mp3');
            bufGlitchIntro = await loadBuffer('./audio/ascii-airlines-boss2-intro.mp3');
            bufGlitchLoop = await loadBuffer('./audio/ascii-airlines-boss2-loop.mp3');
            bufBoss3Intro = await loadBuffer('./audio/ascii-airlines-boss3-intro.mp3');
            bufBoss3Loop = await loadBuffer('./audio/ascii-airlines-boss3-loop.mp3');
            bufBoss4Intro = await loadBuffer('./audio/ascii-airlines-boss4-intro.mp3');
            bufBoss4Loop = await loadBuffer('./audio/ascii-airlines-boss4-loop.mp3');
        }
        initAudio();

        function stopBgm(fadeOutTime = 0) {
            if (bgmRetryTimeout) { clearTimeout(bgmRetryTimeout); bgmRetryTimeout = null; }
            if (bgmIsPlaying) {
                bgmOffset += audioCtx.currentTime - bgmLastStartTime;
                bgmIsPlaying = false;
            }
            bgmGain.gain.cancelScheduledValues(audioCtx.currentTime);
            if (fadeOutTime > 0) {
                bgmGain.gain.setValueAtTime(bgmGain.gain.value, audioCtx.currentTime);
                bgmGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + fadeOutTime);
                const sourcesToStop = [...bgmSources];
                setTimeout(() => {
                    sourcesToStop.forEach(src => { try { src.stop(); } catch(e){} });
                }, fadeOutTime * 1000);
            } else {
                bgmGain.gain.value = 0;
                bgmSources.forEach(src => { try { src.stop(); } catch(e){} });
            }
            bgmSources = [];
        }

        function playBgm(fadeInTime = 0) {
            if (bgmRetryTimeout) { clearTimeout(bgmRetryTimeout); bgmRetryTimeout = null; }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            stopBgm(0);
            if (!buf1 || !buf2) {
                bgmRetryTimeout = setTimeout(() => playBgm(fadeInTime), 100);
                return;
            }
            
            bgmGain.gain.cancelScheduledValues(audioCtx.currentTime);
            bgmGain.gain.setValueAtTime(fadeInTime > 0 ? 0 : 1, audioCtx.currentTime);
            if (fadeInTime > 0) {
                bgmGain.gain.linearRampToValueAtTime(1, audioCtx.currentTime + fadeInTime);
            }

            const source1 = audioCtx.createBufferSource(); source1.buffer = buf1; source1.connect(bgmGain);
            const source2 = audioCtx.createBufferSource(); source2.buffer = buf2; source2.loop = true; source2.connect(bgmGain);

            bgmLastStartTime = audioCtx.currentTime;
            bgmIsPlaying = true;

            const totalIntro = buf1.duration;
            const loopDur = buf2.duration;

            if (bgmOffset < totalIntro) {
                source1.start(audioCtx.currentTime, bgmOffset);
                source2.start(audioCtx.currentTime + totalIntro - bgmOffset);
                bgmSources.push(source1, source2);
            } else {
                const loopOffset = (bgmOffset - totalIntro) % loopDur;
                source2.start(audioCtx.currentTime, loopOffset);
                bgmSources.push(source2);
            }
        }

        function stopBossMusic(fadeOutTime = 0) {
            bossGain.gain.cancelScheduledValues(audioCtx.currentTime);
            if (fadeOutTime > 0) {
                bossGain.gain.setValueAtTime(bossGain.gain.value, audioCtx.currentTime);
                bossGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + fadeOutTime);
                const sourcesToStop = [...bossSources];
                setTimeout(() => {
                    sourcesToStop.forEach(src => { try { src.stop(); } catch(e){} });
                }, fadeOutTime * 1000);
            } else {
                bossGain.gain.value = 0;
                bossSources.forEach(src => { try { src.stop(); } catch(e){} });
            }
            bossSources = [];
        }

        function playBossMusic(introBuf, loopBuf) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            stopBossMusic(0);
            if (!introBuf || !loopBuf) return;
            
            bossGain.gain.cancelScheduledValues(audioCtx.currentTime);
            bossGain.gain.setValueAtTime(1, audioCtx.currentTime);

            const source1 = audioCtx.createBufferSource(); source1.buffer = introBuf; source1.connect(bossGain);
            const source2 = audioCtx.createBufferSource(); source2.buffer = loopBuf; source2.loop = true; source2.connect(bossGain);
            
            const now = audioCtx.currentTime;
            source1.start(now);
            source2.start(now + introBuf.duration);
            bossSources.push(source1, source2);
        }

        function stopMusic() {
            if (bossMusicTimeout) { clearTimeout(bossMusicTimeout); bossMusicTimeout = null; }
            stopBgm(0);
            stopBossMusic(0);
        }

        function startMusic() {
            bgmOffset = 0;
            playBgm(0);
        }

        function resumeMainMusic() {
            playBgm(2.0);
        }

        function startVoidWalkerMusic() {
            if (bossMusicTimeout) clearTimeout(bossMusicTimeout);
            stopBgm(1.5);
            bossMusicTimeout = setTimeout(() => {
                playBossMusic(bufVoidIntro, bufVoidLoop);
            }, 1000);
        }

        function stopVoidWalkerMusic() {
            if (bossMusicTimeout) clearTimeout(bossMusicTimeout);
            stopBossMusic(2.0);
            resumeMainMusic();
        }

        function fadeMusicForDeath() {
            const now = audioCtx.currentTime;
            bgmGain.gain.cancelScheduledValues(now);
            bgmGain.gain.setValueAtTime(bgmGain.gain.value, now);
            bgmGain.gain.linearRampToValueAtTime(0.4, now + 4.0);
            bossGain.gain.cancelScheduledValues(now);
            bossGain.gain.setValueAtTime(bossGain.gain.value, now);
            bossGain.gain.linearRampToValueAtTime(0.4, now + 4.0);
        }

        function startDistortedGlitchMusic() {
            if (bossMusicTimeout) clearTimeout(bossMusicTimeout);
            stopBgm(1.5);
            bossMusicTimeout = setTimeout(() => {
                playBossMusic(bufGlitchIntro, bufGlitchLoop);
            }, 1000);
        }

        function stopDistortedGlitchMusic() {
            if (bossMusicTimeout) clearTimeout(bossMusicTimeout);
            stopBossMusic(2.0);
            resumeMainMusic();
        }

        function startSignalGhostMusic() {
            if (bossMusicTimeout) clearTimeout(bossMusicTimeout);
            stopBgm(1.5);
            bossMusicTimeout = setTimeout(() => {
                playBossMusic(bufBoss3Intro, bufBoss3Loop);
            }, 1000);
        }

        function stopSignalGhostMusic() {
            if (bossMusicTimeout) clearTimeout(bossMusicTimeout);
            stopBossMusic(2.0);
            resumeMainMusic();
        }

        function startOverheatingFirewallMusic() {
            if (bossMusicTimeout) clearTimeout(bossMusicTimeout);
            stopBgm(1.5);
            bossMusicTimeout = setTimeout(() => {
                playBossMusic(bufBoss4Intro, bufBoss4Loop);
            }, 1000);
        }

        function stopOverheatingFirewallMusic() {
            if (bossMusicTimeout) clearTimeout(bossMusicTimeout);
            stopBossMusic(2.0);
            resumeMainMusic();
        }

        // Render Configuration
        const LOGICAL_W = 750;
        const LOGICAL_H = 1000;
        const HUD_HEIGHT = 68;
        const HUD_BAR_BLOCKS = 15;
        const CANVAS_BORDER = 2;
        let width = LOGICAL_W;
        let height = LOGICAL_H;
        let charW = 0, charH = 0;
        const FONT_SIZE = 14;
        let hudWeaponCellSize = 14;

        // Boss Death Cinematic
        const BOSS_CINEMATIC_OVERLAY_FADE_IN = 0.5;
        const BOSS_CINEMATIC_LETTERBOX_START = 1.0;
        const BOSS_CINEMATIC_LETTERBOX_SLIDE = 0.3;
        const BOSS_CINEMATIC_MUSIC_CUT = 2.0;
        const BOSS_CINEMATIC_BLINK_START = 2.0;
        const BOSS_CINEMATIC_BLINK_DURATION = 0.5;
        const BOSS_CINEMATIC_BLINK_COUNT = 4;
        const BOSS_CINEMATIC_EXPLOSION_START = 3.0;
        const BOSS_CINEMATIC_RESUME_TIME = 4.0;
        const BOSS_CINEMATIC_OUTRO_FADE = 0.5;
        const BOSS_CINEMATIC_LETTERBOX_HEIGHT_RATIO = 0.12;
        const BOSS_CINEMATIC_CUBE_SCALE = 0.92;
        const BOSS_CINEMATIC_CUBE_DEPTH_SCALE = 0.85;
        const BOSS_CINEMATIC_FIREWALL_CORE_SCALE = 3.8;
        const BOSS_CINEMATIC_EXPLOSION_SPEED_MIN = 260;
        const BOSS_CINEMATIC_EXPLOSION_SPEED_MAX = 760;
        const BOSS_CINEMATIC_EXPLOSION_JITTER = 140;
        const BOSS_CINEMATIC_ROTATION_SPEED_MIN = 1.2;
        const BOSS_CINEMATIC_ROTATION_SPEED_MAX = 6.2;
        const BOSS_CINEMATIC_GRAVITY = 980;
        const BOSS_CINEMATIC_SHOCKWAVE_DURATION = 0.8;
        const BOSS_CINEMATIC_SHOCKWAVE_START_RADIUS = 28;
        const BOSS_CINEMATIC_SHOCKWAVE_END_RADIUS = 640;
        const BOSS_CINEMATIC_SFX_GAIN = 0.95;
        const BOSS_CINEMATIC_SFX_ATTACK = 0.01;
        const BOSS_CINEMATIC_SFX_NOISE_DURATION = 0.45;
        const BOSS_CINEMATIC_SFX_RUMBLE_DURATION = 1.2;
        const BOSS_CINEMATIC_SFX_RUMBLE_START_HZ = 120;
        const BOSS_CINEMATIC_SFX_RUMBLE_END_HZ = 30;
        const BOSS_CINEMATIC_SFX_LOW_PASS_START = 900;
        const BOSS_CINEMATIC_SFX_LOW_PASS_END = 180;

        let bossCinematic = null;
        let lastBossRenderSnapshot = null;

        function makeExplosionDriveCurve() {
            const curve = new Float32Array(256);
            for (let i = 0; i < curve.length; i++) {
                const x = (i / (curve.length - 1)) * 2 - 1;
                curve[i] = Math.tanh(x * 2.6);
            }
            return curve;
        }

        const EXPLOSION_DRIVE_CURVE = makeExplosionDriveCurve();

        function syncBossCinematicViewport(displayW, displayH) {
            bossCinematicLayer.style.width = `${displayW}px`;
            bossCinematicLayer.style.height = `${displayH}px`;
            bossCinematicCanvas.width = width;
            bossCinematicCanvas.height = height;

            const barHeight = Math.max(1, displayH * BOSS_CINEMATIC_LETTERBOX_HEIGHT_RATIO);
            bossLetterboxTop.style.height = `${barHeight}px`;
            bossLetterboxBottom.style.height = `${barHeight}px`;

            if (!bossCinematic) return;

            bossCinematic.renderer.setSize(width, height, false);
            bossCinematic.camera.left = 0;
            bossCinematic.camera.right = width;
            bossCinematic.camera.top = 0;
            bossCinematic.camera.bottom = height;
            bossCinematic.camera.updateProjectionMatrix();
        }

        function setBossLetterboxProgress(progress) {
            const clamped = Math.max(0, Math.min(1, progress));
            bossLetterboxTop.style.transform = `translateY(${(-1 + clamped) * 100}%)`;
            bossLetterboxBottom.style.transform = `translateY(${(1 - clamped) * 100}%)`;
        }

        function recordBossRenderGlyph(entries, char, worldX, worldY, color, size = 1) {
            entries.push({ char, worldX, worldY, color, size });
        }

        function buildFallbackBossSnapshot(bossObj) {
            const entries = [];
            const sprite = bossObj && bossObj.sprite ? bossObj.sprite : [];
            const fallbackColor = bossObj && bossObj.flashTimer > 0 ? '#ffffff' : ((bossObj && bossObj.color) || '#ffffff');

            if (bossObj && bossObj.name === 'NULL PHANTOM' && sprite.length > 0) {
                const layout = getNullPhantomRenderLayout(bossObj);
                for (let r = 0; r < sprite.length; r++) {
                    for (let c = 0; c < sprite[r].length; c++) {
                        const char = sprite[r][c];
                        if (char !== ' ') {
                            const glyphPos = getNullPhantomGlyphPosition(layout, r, c);
                            recordBossRenderGlyph(
                                entries,
                                char,
                                glyphPos.x | 0,
                                glyphPos.y | 0,
                                bossObj.flashTimer > 0 ? '#ffffff' : getNullPhantomBodyColor(char),
                                layout.cubeScale
                            );
                        }
                    }
                }
            } else if (bossObj && bossObj.name === 'GHOST SIGNAL' && sprite.length > 0) {
                const layout = getGhostSignalRenderLayout(bossObj);
                for (let r = 0; r < sprite.length; r++) {
                    for (let c = 0; c < sprite[r].length; c++) {
                        const char = sprite[r][c];
                        if (char !== ' ') {
                            const glyphPos = getGhostSignalGlyphPosition(bossObj, layout, r, c);
                            recordBossRenderGlyph(
                                entries,
                                char,
                                glyphPos.x | 0,
                                glyphPos.y | 0,
                                bossObj.flashTimer > 0 ? '#ffffff' : getGhostSignalBodyColor(char),
                                layout.cubeScale
                            );
                        }
                    }
                }
                const eyeColor = bossObj.flashTimer > 0 ? '#ffffff' : GHOST_SIGNAL_EYE_COLOR;
                recordBossRenderGlyph(entries, '@', (bossObj.x - layout.eyeOffset) | 0, layout.eyeY | 0, eyeColor, layout.cubeScale * 1.35);
                recordBossRenderGlyph(entries, '@', (bossObj.x + layout.eyeOffset) | 0, layout.eyeY | 0, eyeColor, layout.cubeScale * 1.35);
            } else if (sprite.length > 0) {
                const startX = bossObj.x - (sprite[0].length * charW) / 2;
                const startY = bossObj.y - (sprite.length * charH) / 2;
                for (let r = 0; r < sprite.length; r++) {
                    for (let c = 0; c < sprite[r].length; c++) {
                        if (sprite[r][c] !== ' ') {
                            recordBossRenderGlyph(entries, sprite[r][c], (startX + c * charW) | 0, (startY + r * charH) | 0, fallbackColor);
                        }
                    }
                }
            }

            if (bossObj && bossObj.name === 'OVERHEATING FIREWALL' && bossObj.phase === 'ACTIVE') {
                recordBossRenderGlyph(
                    entries,
                    '@',
                    bossObj.x,
                    bossObj.y + 20,
                    bossObj.isVulnerable ? '#00ffff' : '#ff0000',
                    BOSS_CINEMATIC_FIREWALL_CORE_SCALE
                );
            }

            if (entries.length === 0 && bossObj) {
                recordBossRenderGlyph(entries, '#', bossObj.x, bossObj.y, fallbackColor);
            }

            return {
                source: bossObj,
                centerX: bossObj ? bossObj.x : width / 2,
                centerY: bossObj ? bossObj.y : height / 2,
                entries
            };
        }

        function getBossCinematicSnapshot(bossObj) {
            if (lastBossRenderSnapshot && lastBossRenderSnapshot.source === bossObj && lastBossRenderSnapshot.entries.length > 0) {
                return {
                    source: bossObj,
                    centerX: lastBossRenderSnapshot.centerX,
                    centerY: lastBossRenderSnapshot.centerY,
                    entries: lastBossRenderSnapshot.entries.map(entry => ({ ...entry }))
                };
            }
            return buildFallbackBossSnapshot(bossObj);
        }

        function playExplosionSFX() {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const now = audioCtx.currentTime;
            const masterGain = audioCtx.createGain();
            masterGain.gain.value = BOSS_CINEMATIC_SFX_GAIN;
            masterGain.connect(gainNode);

            const shaper = audioCtx.createWaveShaper();
            shaper.curve = EXPLOSION_DRIVE_CURVE;
            shaper.oversample = '4x';
            shaper.connect(masterGain);

            const noiseFrames = Math.max(1, Math.floor(audioCtx.sampleRate * BOSS_CINEMATIC_SFX_NOISE_DURATION));
            const noiseBuffer = audioCtx.createBuffer(1, noiseFrames, audioCtx.sampleRate);
            const noiseData = noiseBuffer.getChannelData(0);
            let heldValue = 0;
            for (let i = 0; i < noiseFrames; i++) {
                if (i % 12 === 0) heldValue = (Math.random() * 2 - 1) * 0.9;
                noiseData[i] = heldValue;
            }

            const noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = noiseBuffer;

            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'lowpass';
            noiseFilter.frequency.setValueAtTime(BOSS_CINEMATIC_SFX_LOW_PASS_START, now);
            noiseFilter.frequency.exponentialRampToValueAtTime(BOSS_CINEMATIC_SFX_LOW_PASS_END, now + BOSS_CINEMATIC_SFX_NOISE_DURATION);
            noiseFilter.Q.value = 0.7;

            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.0001, now);
            noiseGain.gain.linearRampToValueAtTime(1.0, now + BOSS_CINEMATIC_SFX_ATTACK);
            noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + BOSS_CINEMATIC_SFX_NOISE_DURATION);

            noiseSource.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(shaper);

            const rumbleOsc = audioCtx.createOscillator();
            rumbleOsc.type = 'sawtooth';
            rumbleOsc.frequency.setValueAtTime(BOSS_CINEMATIC_SFX_RUMBLE_START_HZ, now);
            rumbleOsc.frequency.exponentialRampToValueAtTime(BOSS_CINEMATIC_SFX_RUMBLE_END_HZ, now + BOSS_CINEMATIC_SFX_RUMBLE_DURATION);

            const rumbleFilter = audioCtx.createBiquadFilter();
            rumbleFilter.type = 'lowpass';
            rumbleFilter.frequency.setValueAtTime(220, now);
            rumbleFilter.frequency.exponentialRampToValueAtTime(70, now + BOSS_CINEMATIC_SFX_RUMBLE_DURATION);

            const rumbleGain = audioCtx.createGain();
            rumbleGain.gain.setValueAtTime(0.0001, now);
            rumbleGain.gain.linearRampToValueAtTime(0.65, now + BOSS_CINEMATIC_SFX_ATTACK);
            rumbleGain.gain.exponentialRampToValueAtTime(0.0001, now + BOSS_CINEMATIC_SFX_RUMBLE_DURATION);

            rumbleOsc.connect(rumbleFilter);
            rumbleFilter.connect(rumbleGain);
            rumbleGain.connect(shaper);

            const cleanup = () => {
                try { noiseSource.disconnect(); } catch (e) {}
                try { noiseFilter.disconnect(); } catch (e) {}
                try { noiseGain.disconnect(); } catch (e) {}
                try { rumbleOsc.disconnect(); } catch (e) {}
                try { rumbleFilter.disconnect(); } catch (e) {}
                try { rumbleGain.disconnect(); } catch (e) {}
                try { shaper.disconnect(); } catch (e) {}
                try { masterGain.disconnect(); } catch (e) {}
            };

            rumbleOsc.onended = cleanup;
            noiseSource.start(now);
            noiseSource.stop(now + BOSS_CINEMATIC_SFX_NOISE_DURATION);
            rumbleOsc.start(now);
            rumbleOsc.stop(now + BOSS_CINEMATIC_SFX_RUMBLE_DURATION);
        }

        function finalizeBossDefeat(defeatedBoss) {
            if (!defeatedBoss) return;

            explodeBoss(defeatedBoss);

            drops.push({ x: defeatedBoss.x, y: defeatedBoss.y, vy: 30, vx: 0, isWeapon: true, options: opts, cycleTimer: 0, currentIndex: 0 });

        }

        function teardownBossCinematic() {
            if (!bossCinematic) return;

            bossCinematic.cubes.forEach(cube => {
                bossCinematic.scene.remove(cube.mesh);
                cube.geometry.dispose();
                cube.material.dispose();
            });

            if (bossCinematic.shockwave) {
                bossCinematic.scene.remove(bossCinematic.shockwave);
                bossCinematic.shockwave.geometry.dispose();
                bossCinematic.shockwave.material.dispose();
            }

            bossCinematic.renderer.dispose();
            bossCinematicLayer.style.opacity = '0';
            bossCinematicLayer.style.display = 'none';
            setBossLetterboxProgress(0);
            bossCinematic = null;
        }

        function triggerBossCinematic(defeatedBoss, onComplete) {
            if (!defeatedBoss) return;

            if (bossCinematic || typeof THREE === 'undefined') {
                boss = null;
                if (onComplete) onComplete();
                return;
            }

            const snapshot = getBossCinematicSnapshot(defeatedBoss);
            const renderer = new THREE.WebGLRenderer({ canvas: bossCinematicCanvas, alpha: true, antialias: false });
            renderer.setPixelRatio(1);
            renderer.setSize(width, height, false);
            renderer.setClearColor(0x000000, 0);

            const scene = new THREE.Scene();
            const camera = new THREE.OrthographicCamera(0, width, height, 0, 1, 2000);
            camera.position.set(0, 0, 500);
            camera.lookAt(0, 0, 0);

            const cubes = snapshot.entries.map(entry => {
                const entryScale = entry.size || 1;
                const geometry = new THREE.BoxGeometry(
                    Math.max(8, charW * BOSS_CINEMATIC_CUBE_SCALE * entryScale),
                    Math.max(8, charH * BOSS_CINEMATIC_CUBE_SCALE * entryScale),
                    Math.max(8, Math.min(charW, charH) * BOSS_CINEMATIC_CUBE_DEPTH_SCALE * entryScale)
                );
                const material = new THREE.MeshBasicMaterial({
                    color: entry.color || '#ffffff',
                    transparent: true,
                    opacity: 1
                });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(entry.worldX, entry.worldY, 0);
                mesh.rotation.set(Math.random() * 0.25, Math.random() * 0.25, Math.random() * 0.25);
                scene.add(mesh);

                return {
                    mesh,
                    geometry,
                    material,
                    baseColor: new THREE.Color(entry.color || '#ffffff'),
                    velocity: new THREE.Vector3(0, 0, 0),
                    angularVelocity: new THREE.Vector3(0, 0, 0)
                };
            });

            const shockwave = new THREE.Mesh(
                new THREE.RingGeometry(BOSS_CINEMATIC_SHOCKWAVE_START_RADIUS, BOSS_CINEMATIC_SHOCKWAVE_START_RADIUS + 8, 48),
                new THREE.MeshBasicMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0,
                    side: THREE.DoubleSide
                })
            );
            shockwave.position.set(snapshot.centerX, snapshot.centerY, 40);
            scene.add(shockwave);

            const displayW = canvas.clientWidth || width;
            const displayH = canvas.clientHeight || height;
            bossCinematicLayer.style.display = 'block';
            bossCinematicLayer.style.opacity = '0';
            setBossLetterboxProgress(0);

            boss = null;

            bossCinematic = {
                scene,
                camera,
                renderer,
                cubes,
                shockwave,
                centerX: snapshot.centerX,
                centerY: snapshot.centerY,
                startTime: performance.now(),
                lastNow: performance.now(),
                paused: true,
                hasCutMusic: false,
                hasExploded: false,
                hasResumed: false,
                onComplete
            };

            syncBossCinematicViewport(displayW, displayH);
            lastTime = bossCinematic.startTime;
            lastRafTime = bossCinematic.startTime;
        }

        function maybeTriggerBossDeathCinematic(bossObj) {
            if (!bossObj || bossCinematic || bossObj.hp > 0) return false;
            bossObj.hp = 0;
            triggerBossCinematic(bossObj, () => finalizeBossDefeat(bossObj));
            return true;
        }

        function updateBossCinematic(now) {
            if (!bossCinematic) return;

            const elapsed = (now - bossCinematic.startTime) / 1000;
            const dtSec = Math.min((now - bossCinematic.lastNow) / 1000, 0.05);
            bossCinematic.lastNow = now;

            const overlayAlpha = elapsed < BOSS_CINEMATIC_OVERLAY_FADE_IN
                ? Math.min(1, elapsed / BOSS_CINEMATIC_OVERLAY_FADE_IN)
                : (elapsed >= BOSS_CINEMATIC_RESUME_TIME
                    ? Math.max(0, 1 - ((elapsed - BOSS_CINEMATIC_RESUME_TIME) / BOSS_CINEMATIC_OUTRO_FADE))
                    : 1);
            bossCinematicLayer.style.opacity = overlayAlpha.toString();

            if (elapsed < BOSS_CINEMATIC_LETTERBOX_START) {
                setBossLetterboxProgress(0);
            } else if (elapsed < BOSS_CINEMATIC_LETTERBOX_START + BOSS_CINEMATIC_LETTERBOX_SLIDE) {
                const t = (elapsed - BOSS_CINEMATIC_LETTERBOX_START) / BOSS_CINEMATIC_LETTERBOX_SLIDE;
                setBossLetterboxProgress(1 - Math.pow(1 - t, 3));
            } else if (elapsed < BOSS_CINEMATIC_RESUME_TIME) {
                setBossLetterboxProgress(1);
            } else {
                const t = Math.min(1, (elapsed - BOSS_CINEMATIC_RESUME_TIME) / BOSS_CINEMATIC_OUTRO_FADE);
                setBossLetterboxProgress(Math.max(0, 1 - (1 - Math.pow(1 - t, 3))));
            }

            if (!bossCinematic.hasCutMusic && elapsed >= BOSS_CINEMATIC_MUSIC_CUT) {
                stopMusic();
                bossCinematic.hasCutMusic = true;
            }

            const blinkActive = elapsed >= BOSS_CINEMATIC_BLINK_START && elapsed < BOSS_CINEMATIC_BLINK_START + BOSS_CINEMATIC_BLINK_DURATION;
            const blinkIndex = blinkActive
                ? Math.floor(((elapsed - BOSS_CINEMATIC_BLINK_START) / BOSS_CINEMATIC_BLINK_DURATION) * (BOSS_CINEMATIC_BLINK_COUNT * 2))
                : -1;
            const blinkWhite = blinkActive && blinkIndex % 2 === 0;

            if (!bossCinematic.hasExploded && elapsed >= BOSS_CINEMATIC_EXPLOSION_START) {
                bossCinematic.hasExploded = true;
                playExplosionSFX();

                bossCinematic.cubes.forEach(cube => {
                    const dx = cube.mesh.position.x - bossCinematic.centerX;
                    const dy = cube.mesh.position.y - bossCinematic.centerY;
                    const length = Math.hypot(dx, dy) || 1;
                    const speed = BOSS_CINEMATIC_EXPLOSION_SPEED_MIN + Math.random() * (BOSS_CINEMATIC_EXPLOSION_SPEED_MAX - BOSS_CINEMATIC_EXPLOSION_SPEED_MIN);
                    cube.velocity.set(
                        (dx / length) * speed + (Math.random() - 0.5) * BOSS_CINEMATIC_EXPLOSION_JITTER,
                        (dy / length) * speed + (Math.random() - 0.5) * BOSS_CINEMATIC_EXPLOSION_JITTER,
                        (Math.random() - 0.5) * 260
                    );
                    cube.angularVelocity.set(
                        (Math.random() * 2 - 1) * (BOSS_CINEMATIC_ROTATION_SPEED_MIN + Math.random() * (BOSS_CINEMATIC_ROTATION_SPEED_MAX - BOSS_CINEMATIC_ROTATION_SPEED_MIN)),
                        (Math.random() * 2 - 1) * (BOSS_CINEMATIC_ROTATION_SPEED_MIN + Math.random() * (BOSS_CINEMATIC_ROTATION_SPEED_MAX - BOSS_CINEMATIC_ROTATION_SPEED_MIN)),
                        (Math.random() * 2 - 1) * (BOSS_CINEMATIC_ROTATION_SPEED_MIN + Math.random() * (BOSS_CINEMATIC_ROTATION_SPEED_MAX - BOSS_CINEMATIC_ROTATION_SPEED_MIN))
                    );
                });
            }

            const fadeAlpha = elapsed >= BOSS_CINEMATIC_RESUME_TIME
                ? Math.max(0, 1 - ((elapsed - BOSS_CINEMATIC_RESUME_TIME) / BOSS_CINEMATIC_OUTRO_FADE))
                : 1;

            bossCinematic.cubes.forEach(cube => {
                if (bossCinematic.hasExploded) {
                    cube.velocity.y += BOSS_CINEMATIC_GRAVITY * dtSec;
                    cube.mesh.position.x += cube.velocity.x * dtSec;
                    cube.mesh.position.y += cube.velocity.y * dtSec;
                    cube.mesh.position.z += cube.velocity.z * dtSec;
                    cube.mesh.rotation.x += cube.angularVelocity.x * dtSec;
                    cube.mesh.rotation.y += cube.angularVelocity.y * dtSec;
                    cube.mesh.rotation.z += cube.angularVelocity.z * dtSec;
                }

                cube.material.color.copy(blinkWhite ? new THREE.Color('#ffffff') : cube.baseColor);
                cube.material.opacity = fadeAlpha;
            });

            if (bossCinematic.hasExploded) {
                const shockElapsed = elapsed - BOSS_CINEMATIC_EXPLOSION_START;
                if (shockElapsed >= 0 && shockElapsed <= BOSS_CINEMATIC_SHOCKWAVE_DURATION) {
                    const t = shockElapsed / BOSS_CINEMATIC_SHOCKWAVE_DURATION;
                    const scale = BOSS_CINEMATIC_SHOCKWAVE_START_RADIUS + (BOSS_CINEMATIC_SHOCKWAVE_END_RADIUS - BOSS_CINEMATIC_SHOCKWAVE_START_RADIUS) * t;
                    bossCinematic.shockwave.visible = true;
                    bossCinematic.shockwave.scale.set(scale / BOSS_CINEMATIC_SHOCKWAVE_START_RADIUS, scale / BOSS_CINEMATIC_SHOCKWAVE_START_RADIUS, 1);
                    bossCinematic.shockwave.material.opacity = (1 - t) * 0.35 * fadeAlpha;
                } else {
                    bossCinematic.shockwave.visible = false;
                }
            } else {
                bossCinematic.shockwave.visible = false;
            }

            bossCinematic.renderer.render(bossCinematic.scene, bossCinematic.camera);

            if (!bossCinematic.hasResumed && elapsed >= BOSS_CINEMATIC_RESUME_TIME) {
                bossCinematic.hasResumed = true;
                bossCinematic.paused = false;
                lastTime = now;
                lastRafTime = now;
                if (bossCinematic.onComplete) bossCinematic.onComplete();
            }

            if (elapsed >= BOSS_CINEMATIC_RESUME_TIME + BOSS_CINEMATIC_OUTRO_FADE) {
                teardownBossCinematic();
            }
        }

                let r = Math.random() * totalWeight;
                for(let j=0; j<pool.length; j++) {
                    r -= weaponWeights[pool[j].name];
                    if(r <= 0) {
                        drawn.push(pool[j]);
                        pool.splice(j, 1);

            let weights = { common: 100, rare: 0, epic: 0 };
            if (level >= 16) weights = { common: 50, rare: 35, epic: 15 };
            else if (level >= 8) weights = { common: 70, rare: 30, epic: 0 };
            
            let shuffled = pool.slice().sort(() => Math.random() - 0.5);
            let selected = []; let usedCats = new Set();
            for (let item of shuffled) {
                if (!usedCats.has(item.cat)) { 
                    selected.push(item); 
                    usedCats.add(item.cat); 
                    if (selected.length === count) break; 
                }
            }
            // Fill remainder if needed
            for (let item of shuffled) { 
                if (selected.length === count) break; 
                if (!selected.includes(item)) selected.push(item); 
            }
            
            return selected.map(item => {
                let r = Math.random() * 100; let rarity = 'Common';
                if (r < weights.epic) rarity = 'Epic'; 
                else if (r < weights.epic + weights.rare) rarity = 'Rare';
                
                let mult = rarity === 'Epic' ? 1.5 : (rarity === 'Rare' ? 1.25 : 1.0);
                let val = item.type === 'multiplicative' ? 1 - (1 - item.baseVal) * mult : item.baseVal * mult;
                
                let color = rarity === 'Epic' ? '#ff8800' : (rarity === 'Rare' ? '#aa00ff' : '#aaaaaa');
                let displayName = rarity === 'Common' ? item.name : `${rarity.toUpperCase()} ${item.name}`;
                
                return { ...item, rarity, value: val, color, displayName };
            });
        }

                { count: 16, color: '#ff0088', type: 'horizontalDrop', speed: 1.6, elite: true, hpMult: 2 }, // Wave 18
                { count: 20, color: '#ff00ff', type: 'erraticScatter', speed: 2.0, doubleElite: true, hpMult: 2 }, // Wave 19
                { isBoss: true, name: 'OVERHEATING FIREWALL', sprite: FIREWALL_SPRITE, hp: 2800 } // Wave 20
            ],
            spawn() {
                const w = this.waves[this.currentWave];
                if (w.isBoss) {
                    boss = { 
                        x: width / 2, y: -200, hp: w.hp, maxHp: w.hp, name: w.name, sprite: w.sprite || [],
                        phase: 'INTRO', timer: 0, attackPattern: 0, lastFire: 0, spiralAngle: 0, 
                        color: '#444444', // All bosses start grey in intro
                        flashTimer: 0
                    };
                    if (w.name === 'NULL PHANTOM') {
                        startVoidWalkerMusic();
                    }
                    if (w.name === 'GHOST SIGNAL') {
                        startSignalGhostMusic();
                    }
                    if (w.name === 'OVERHEATING FIREWALL') {
                        startOverheatingFirewallMusic();
                        boss.coreTimer = 0;
                        boss.isVulnerable = false;
                    }
                    if (w.name === 'DISTORTED GLITCH') {
                        startDistortedGlitchMusic();
                        boss.isGlitch = true; boss.stage = 1; boss.colorCycleTimer = 0;
                        boss.glitchVx = 0; boss.glitchVy = 0; boss.dirChangeTimer = 0;
                        boss.baseSpeed = 100; boss.scatterTimer = 0; boss.chargeTimer = 0;
                        boss.isCharging = false; boss.chargeDuration = 0; boss.glowIntensity = 0;
                        boss.transitionFlash = 0; boss.transitionTextTimer = 0; boss.deathTimer = 0;
                        boss.isDeadGlitching = false; boss.scrambledName = "DISTORTED GLITCH";
                        boss.scrambleTimer = 0; boss.barLieTimer = 0; boss.barLieWidth = 0;
                        boss.isDoubleCharge = false; boss.doubleChargePhase = 0;
                        boss.codeVolleyTimer = 5.0 + Math.random() * 3.0; boss.codeVolleyShots = 0; boss.codeVolleyDelay = 0; boss.isCodeVolley = false;
                    }
                } else {
                    if (w.type && (w.type.startsWith('zig') || w.type.startsWith('wave') || w.type === 'snake')) {
                        let path, pathA, pathB;
                        if (w.type === 'zig1') path = [{x: 0.1, y: -0.2}, {x: 0.9, y: 0.15}, {x: 0.1, y: 0.3}, {x: 0.9, y: 0.45}, {x: 0.1, y: 0.6}, {x: 0.1, y: -0.2}];
                        else if (w.type === 'zig2') path = [{x: 0.9, y: -0.2}, {x: 0.1, y: 0.15}, {x: 0.9, y: 0.3}, {x: 0.1, y: 0.45}, {x: 0.9, y: 0.6}, {x: 0.9, y: -0.2}];
                        else if (w.type === 'zig3') path = [{x: 0.5, y: -0.2}, {x: 0.05, y: 0.15}, {x: 0.95, y: 0.3}, {x: 0.05, y: 0.45}, {x: 0.95, y: 0.6}, {x: 0.5, y: -0.2}];
                        else if (w.type === 'zig4') path = [{x: 0.5, y: -0.2}, {x: 0.8, y: 0.09}, {x: 0.2, y: 0.26}, {x: 0.8, y: 0.43}, {x: 0.2, y: 0.6}, {x: 0.5, y: -0.2}];
                        else if (w.type === 'wave2') path = [{x:0.2, y:-0.1}, {x:0.8, y:0.53}, {x:0.1, y:0.13}, {x:0.9, y:0.27}, {x:0.1, y:0.6}, {x:0.8, y:-0.1}];
                        else if (w.type === 'wave3') path = [{x:0.5, y:-0.1}, {x:0.5, y:0.26}, {x:0.2, y:0.26}, {x:0.2, y:0.09}, {x:0.8, y:0.09}, {x:0.8, y:0.43}, {x:0.3, y:0.43}, {x:0.3, y:0.6}, {x:0.9, y:0.6}, {x:0.9, y:-0.1}];
                        else if (w.type === 'wave4') {
                            pathA = [{x:0.2, y:-0.1}, {x:0.8, y:0.33}, {x:0.2, y:0.6}, {x:0.9, y:0.33}, {x:0.1, y:-0.1}];
                            pathB = [{x:0.8, y:-0.1}, {x:0.2, y:0.33}, {x:0.8, y:0.6}, {x:0.1, y:0.33}, {x:0.9, y:-0.1}];
                        }
                        else if (w.type === 'wave6') {
                            pathA = [{x:0.1, y:-0.1}, {x:0.4, y:0.15}, {x:0.4, y:0.6}, {x:0.1, y:0.6}, {x:0.1, y:-0.1}];
                            pathB = [{x:0.9, y:-0.1}, {x:0.6, y:0.15}, {x:0.6, y:0.6}, {x:0.9, y:0.6}, {x:0.9, y:-0.1}];
                        }
                        else if (w.type === 'wave7') path = [{x:0.5, y:-0.1}, {x:0.2, y:0.3}, {x:0.8, y:0.6}, {x:0.5, y:0.3}, {x:0.2, y:-0.1}];
                        else if (w.type === 'wave8') {
                            pathA = [{x: 0.5, y: -0.1}];
                            pathB = [{x: 0.5, y: -0.1}];
                            const numPts = 30;
                            const offset = Math.PI * 0.75; 
                            for (let i = 0; i <= numPts; i++) {
                                let t = offset + (i / numPts) * Math.PI * 2;
                                let xA = 0.5 + Math.sin(t) * 0.35;
                                let yA = 0.5 + (Math.sin(t) * Math.cos(t)) * 0.7; 
                                let xB = 0.5 - Math.sin(t) * 0.35; 
                                pathA.push({x: xA, y: yA});
                                pathB.push({x: xB, y: yA});
                            }
                            pathA.push({x: 0.5, y: -0.1});
                            pathB.push({x: 0.5, y: -0.1});
                        }
                        else if (w.type === 'wave9') path = [{x:0.2, y:-0.1}, {x:0.8, y:0.3}, {x:0.2, y:0.6}, {x:0.8, y:1.2}];
                        else if (w.type === 'snake') {
                            path = [];
                            for(let k=0; k<=40; k++){
                                let y = -0.1 + (k/40)*1.2;
                                let x = 0.5 + Math.sin(k * 0.8) * 0.35;
                                path.push({x: x, y: y});
                            }
                        }

                        const stagger = w.type === 'snake' ? 0.12 : (w.doubleElite ? 0.25 : (w.speed ? 0.4 : 0.6));
                        for (let i = 0; i < w.count; i++) {
                            const isTail = (w.type === 'snake' && i === w.count - 1);
                            const isElite = (w.elite && i === Math.floor(w.count / 2)) || 
                                            (w.doubleElite && (i === Math.floor(w.count / 3) || i === Math.floor(w.count * 2 / 3))) ||
                                            (w.type === 'snake' && i % 10 === 0 && !isTail);
                            const isArmored = (!isElite && i % 2 === 1 && !isTail);
                            
                            let sprite = ["  ▄▄█▄▄  ", " ▀▀███▀▀ ", "   ▀█▀   "];
                            let hp = 10, color = w.color;
                            
                            if (isTail) {
                                sprite = ["  ▲  ", " (█) ", "(███)", " ▀█▀ "];
                                hp = 200; color = '#e38914';
                            } else if (isElite) {
                                sprite = [" ▄▄███▄▄ ", "▀▀█████▀▀", " ▀█████▀ ", "   ▀█▀   "];
                                hp = 30; color = '#0044ff';
                            } else if (isArmored) {
                                sprite = [" ▄▄▄█▄▄▄ ", " ▀▀███▀▀ ", "   ▀█▀   "];
                                hp = 20; color = '#00ff44';
                            }

                            let currentPath = path;
                            if (pathA && pathB) {
                                currentPath = (i % 2 === 0) ? pathA : pathB;
                            }
                            
                            let pathT = -i * stagger;
                            if (w.type === 'wave8') {
                                pathT = -i * 1.5;
                            } else if (pathA && pathB) {
                                pathT = -Math.floor(i / 2) * stagger;
                            } else if (w.type === 'wave7') {
                                pathT = -i * 0.15;
                            } else if (w.type === 'wave9') {
                                pathT = -i * 0.2;
                            }

                            enemies.push({ 
                                x: currentPath[0].x * width, y: currentPath[0].y * height, vx: 0, vy: 0, 
                                sprite, color, hp, maxHp: hp, isArmored, isElite, isFlameGuardian: isTail,
                                onScreen: false, flashTimer: 0, hoverX: 0, fireTimer: 0,
                                path: currentPath, pathIndex: 0, pathT: pathT, speedMult: w.speed || 1, pathTypeWave: w.type
                            });
                        }
                    } else {
                        // Advanced parametric paths for Waves 16-19
                        for (let i = 0; i < w.count; i++) {
                            const isElite = (w.elite && i === Math.floor(w.count / 2)) || 
                                            (w.doubleElite && (i === Math.floor(w.count / 3) || i === Math.floor(w.count * 2 / 3)));
                            const isArmored = !isElite && i % 2 === 1;
                            let sprite = ["  ▄▄█▄▄  ", " ▀▀███▀▀ ", "   ▀█▀   "];
                            let hp = (w.hpMult || 1) * 10;
                            let color = w.color || '#ff00ff';
                            if (isElite) {
                                sprite = [" ▄▄███▄▄ ", "▀▀█████▀▀", " ▀█████▀ ", "   ▀█▀   "];
                                hp = (w.hpMult || 1) * 30; color = '#0044ff';
                            } else if (isArmored) {
                                sprite = [" ▄▄▄█▄▄▄ ", " ▀▀███▀▀ ", "   ▀█▀   "];
                                hp = (w.hpMult || 1) * 20; color = '#00ff44';
                            }
                            
                            let startX = width / 2;
                            let startY = -50;
                            let delay = -i * 0.3;
                            
                            if (w.type === 'horizontalDrop') {
                                startX = i % 2 === 0 ? -50 : width + 50;
                                startY = height * 0.15 + Math.random() * 100;
                            } else if (w.type === 'weave') {
                                startX = width * 0.2 + (i / w.count) * width * 0.6;
                                startY = -50 - i * 40;
                                delay = 0;
                            } else if (w.type === 'spiral') {
                                startX = width / 2; startY = height / 3;
                                delay = 0;
                            } else if (w.type === 'erraticScatter') {
                                startX = width / 2 + (Math.random()-0.5)*100;
                                startY = -50 - Math.random()*100;
                            }

                            enemies.push({ 
                                x: startX, y: startY, vx: 0, vy: 0, 
                                sprite, color, hp, maxHp: hp, isArmored, isElite, onScreen: false, flashTimer: 0,
                                pathType: w.type, lifeTime: delay, speedMult: w.speed || 1, startX, startY, indexOffset: i * (Math.PI * 2 / Math.max(1, w.count))
                            });
                        }
                    }
                }
                this.currentWave = (this.currentWave + 1) % this.waves.length;
            }
        };

        function explodeEnemy(enemy) {
            const eW = enemy.sprite[0].length * charW, eH = enemy.sprite.length * charH;
            const startX = enemy.x - eW / 2, startY = enemy.y - eH / 2;
            const colors = enemy.isFlameGuardian ? ['#e01926', '#e38914', '#ffdd00', '#ff5500'] : ['#ff4400', '#ff6600', '#ff2200', '#ffaa00'];
            for (let r = 0; r < enemy.sprite.length; r++) {
                for (let c = 0; c < enemy.sprite[r].length; c++) {
                    const char = enemy.sprite[r][c];
                    if (char !== ' ') {
                        debris.push({
                            x: startX + c * charW, y: startY + r * charH,
                            vx: (Math.random() - 0.5) * 600 + (enemy.vx || 0), vy: (Math.random() - 0.5) * 600 + (enemy.vy || 160),
                            char, color: colors[Math.floor(Math.random() * colors.length)], life: 1.0
                        });
                    }
                }
            }
            
            const numOrbs = Math.max(1, Math.floor((enemy.maxHp || 10) / 10));
            for (let i = 0; i < numOrbs; i++) {
                xpOrbs.push({ 
                    x: enemy.x, y: enemy.y, 
                    vx: (Math.random() - 0.5) * 200, 
                    vy: (Math.random() - 0.5) * 200, 
                    char: '⢀', 
                    color: '#ffffff',
                    xpValue: 1
                });
            }
            addShake(5); score += 150; applyWakeForce(enemy.x, enemy.y, 160, 18);
        }

        function explodeBoss(bossObj) {
            const colors = ['#ff4400', '#ff6600', '#ff2200', '#ffaa00'];

            const snapshot = getBossCinematicSnapshot(bossObj);
            if (snapshot.entries.length > 0) {
                const debrisCap = bossObj.name === 'NULL PHANTOM'
                    ? 520
                    : (bossObj.name === 'GHOST SIGNAL' ? 420 : 0);
                const debrisEntries = debrisCap > 0 && snapshot.entries.length > debrisCap
                    ? snapshot.entries.filter((_, index) => index % Math.ceil(snapshot.entries.length / debrisCap) === 0)
                    : snapshot.entries;
                debrisEntries.forEach(entry => {
                    const pieceColor = (bossObj.name === 'GHOST SIGNAL' || bossObj.name === 'NULL PHANTOM')
                        ? entry.color
                        : colors[Math.floor(Math.random() * colors.length)];
                    const burstCopies = (bossObj.name === 'GHOST SIGNAL' || bossObj.name === 'NULL PHANTOM') ? 1 : 2;
                    for (let j = 0; j < burstCopies; j++) {
                        debris.push({
                            x: entry.worldX,
                            y: entry.worldY,
                            vx: (Math.random() - 0.5) * 1200,
                            vy: (Math.random() - 0.5) * 1200,
                            char: entry.char,
                            color: pieceColor,
                            life: 2.0
                        });
                    }
                });
            } else {
                for (let j = 0; j < 50; j++) {
                    debris.push({
                        x: bossObj.x + (Math.random() - 0.5) * 150, y: bossObj.y + (Math.random() - 0.5) * 150,
                        vx: (Math.random() - 0.5) * 1500, vy: (Math.random() - 0.5) * 1500,
                        char: ['*', '#', '@', '░'][Math.floor(Math.random() * 4)], 
                        color: colors[Math.floor(Math.random() * colors.length)], life: 2.0
                    });
                }
            }
            
            const totalBossXp = Math.floor(player.xpNeeded * 1.2);
            const numOrbs = Math.floor(Math.sqrt(bossObj.maxHp / 10)); // Adjust orb count based on scaled HP
            const xpPerOrb = Math.floor(totalBossXp / numOrbs);
            const remainder = totalBossXp % numOrbs;
            for(let i=0; i < numOrbs; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 40;
                const speed = 40 + Math.random() * 120;
                xpOrbs.push({ 
                    x: bossObj.x + Math.cos(angle) * dist, 
                    y: bossObj.y + Math.sin(angle) * dist, 
                    vx: Math.cos(angle) * speed, 
                    vy: Math.sin(angle) * speed, 
                    char: ['⣶', '⣾', '⣿'][Math.floor(Math.random() * 3)], 
                    color: '#ffffff',
                    xpValue: xpPerOrb + (i < remainder ? 1 : 0)
                });
            }
            
            addShake(25); score += 20000;
            applyWakeForce(bossObj.x, bossObj.y, 400, 50);
        }

        function radialExplosion(x, y, radius, damage) {
            applyWakeForce(x, y, radius, 35);
            addShake(radius / 8);
            const colors = ['#ff4400', '#ff6600', '#ff2200', '#ffaa00'];
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                if (Math.hypot(e.x - x, e.y - y) < radius) {
                    e.hp -= damage;
                    e.flashTimer = 0.15;
                    if (e.hp <= 0) {
                        explodeEnemy(e);
                        enemies.splice(i, 1);
                    }
                }
            }
            if (boss && boss.phase === 'ACTIVE') {
                if (boss.name === 'OVERHEATING FIREWALL') {
                    if (boss.isVulnerable && Math.hypot(boss.x - x, (boss.y + 20) - y) < radius + 40) {
                        boss.hp -= damage;
                        boss.flashTimer = 0.15;
                        if (maybeTriggerBossDeathCinematic(boss)) return;
                    }
                } else if (Math.hypot(boss.x - x, boss.y - y) < radius) {
                    boss.hp -= damage;
                    boss.flashTimer = 0.15;
                    if (maybeTriggerBossDeathCinematic(boss)) return;
                }
            }
            for (let i = 0; i < 20; i++) {
                debris.push({
                    x, y, vx: (Math.random()-0.5)*radius*4, vy: (Math.random()-0.5)*radius*4,
                    char: '#', color: colors[Math.floor(Math.random() * colors.length)], life: 0.8
                });
            }
        }

        function fireCombo() {
            let s = player.weaponStats;
            let baseDmg = 10 * s.damageMult + player.modifiers.laserDamage;
            if (player.hp < player.maxHp * 0.5) baseDmg *= (1 + player.modifiers.adrenaline);

            const speed = 1400 * s.speedMult;
            const layout = getPlayerRenderLayout(player, getPlayerFacing(player));
            const frontOrigin = getPlayerWeaponOrigin(layout, false);
            const rearOrigin = getPlayerWeaponOrigin(layout, true);

            function spawnBullet(x, y, vx, vy, isRear) {
                let pdmg = isRear ? baseDmg * 1.25 : baseDmg;
                comboProjectiles.push({
                    x, y, vx, vy, baseVx: vx, baseVy: vy, startX: x, startY: y,
                    sprite: s.pathFunction === 'parabolic' ? '◓' : '|',
                    color: '#ffffff',
                    stats: { ...s },
                    life: 2.0, maxLife: 2.0, damage: pdmg,
                    pierceHits: [],
                    pierceCount: s.pierceCount
                });
            }

            let angles = [];
            if (s.pelletCount === 1) angles.push(-Math.PI/2);
            else {
                let startAngle = -Math.PI/2 - s.spreadAngle/2;
                let step = s.spreadAngle / (s.pelletCount - 1);
                for(let i=0; i<s.pelletCount; i++) angles.push(startAngle + step * i);
            }

            for(let a of angles) {
                let aSpread = a + (Math.random() - 0.5) * s.inaccuracy;
                spawnBullet(frontOrigin.x, frontOrigin.y, Math.cos(aSpread) * speed, Math.sin(aSpread) * speed, false);
            }

            if (s.hasRearFire && (player.rearFireTicker++ % 2 === 0)) {
                for(let a of angles) {
                    let ra = a + Math.PI + (Math.random() - 0.5) * s.inaccuracy;
                    spawnBullet(rearOrigin.x, rearOrigin.y, Math.cos(ra) * speed, Math.sin(ra) * speed, true);
                }
            }

            player.lastFire = performance.now();
            addShake(1);
        }

        function fireBomb() {
            player.bombTimer = player.bombCooldown * player.modifiers.bombCooldown;
            radialExplosion(player.x, player.y, 450, 500); 
            if (bossCinematic && bossCinematic.paused) return;
            addShake(40);
            const colors = ['#00ffff', '#ffffff', '#0088ff'];
            for (let j = 0; j < 60; j++) {
                debris.push({ 
                    x: player.x, y: player.y, 
                    vx: (Math.random() - 0.5) * 1500, vy: (Math.random() - 0.5) * 1500, 
                    char: ['*', '#', '@', '░'][Math.floor(Math.random() * 4)], 
                    color: colors[Math.floor(Math.random() * colors.length)], 
                    life: 1.5 
                });
            }
        }

        function initArrays(size) {
            fpHX = new Float32Array(size); fpHY = new Float32Array(size);
            fpX = new Float32Array(size); fpY = new Float32Array(size);
            fpVX = new Float32Array(size); fpVY = new Float32Array(size);
            fpChar = new Uint8Array(size); fpColor = new Uint8Array(size);
            fpAlpha = new Float32Array(size); fpHighlight = new Float32Array(size);
        }

        function resize() {
            const winW = window.innerWidth;
            const winH = window.innerHeight;
            const targetRatio = LOGICAL_W / LOGICAL_H;
            const availableW = Math.max(0, winW - CANVAS_BORDER * 2);
            const getDisplaySize = (hudPixelHeight) => {
                const availableH = Math.max(0, winH - hudPixelHeight - CANVAS_BORDER * 2);
                if (availableW <= 0 || availableH <= 0) return { displayW: 0, displayH: 0 };
                if (availableW / availableH > targetRatio) {
                    const displayH = availableH;
                    return { displayW: displayH * targetRatio, displayH };
                }
                const displayW = availableW;
                return { displayW, displayH: displayW / targetRatio };
            };

            let hudH = HUD_HEIGHT;
            let { displayW, displayH } = getDisplaySize(hudH);
            let hudScale = Math.max(0.7, Math.min(1.45, displayW / LOGICAL_W));
            hudH = Math.max(48, Math.round(HUD_HEIGHT * hudScale));
            ({ displayW, displayH } = getDisplaySize(hudH));
            hudScale = Math.max(0.7, Math.min(1.45, displayW / LOGICAL_W));
            hudH = Math.max(48, Math.round(HUD_HEIGHT * hudScale));
            ({ displayW, displayH } = getDisplaySize(hudH));

            canvas.style.width = `${displayW}px`;
            canvas.style.height = `${displayH}px`;

            const container = document.getElementById('game-container');
            const outerCanvasW = Math.round(displayW + CANVAS_BORDER * 2);
            const outerCanvasH = Math.round(displayH + CANVAS_BORDER * 2);
            container.style.width = `${outerCanvasW}px`;
            container.style.height = `${outerCanvasH + hudH}px`;
            hud.style.width = `${outerCanvasW}px`;
            hud.style.maxWidth = `${outerCanvasW}px`;
            document.documentElement.style.setProperty('--hud-ui-scale', hudScale.toFixed(3));
            document.documentElement.style.setProperty('--hud-height', `${hudH}px`);
            hudWeaponCellSize = Math.max(8, Math.min(16, Math.round(12 * hudScale)));
            document.documentElement.style.setProperty('--hud-weapon-cell', `${hudWeaponCellSize}px`);

            width = LOGICAL_W; height = LOGICAL_H;
            canvas.width = LOGICAL_W; canvas.height = LOGICAL_H;
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.font = `${FONT_SIZE}px Courier New`;
            ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
            const metrics = ctx.measureText('0');
            charW = metrics.width; charH = FONT_SIZE * 1.2;
            syncBossCinematicViewport(displayW, displayH);
            rebuildField();
        }

        function rebuildField() {
            const cols = Math.ceil(width / CELL_SIZE) + 2;
            const rows = Math.ceil(height / CELL_SIZE) + 2;
            numParticles = Math.min(cols * rows, 8000);
            initArrays(numParticles);
            let i = 0;
            for (let y = -1; y <= rows; y++) {
                for (let x = -1; x <= cols; x++) {
                    if (i >= numParticles) break;
                    fpHX[i] = x * CELL_SIZE; fpHY[i] = y * CELL_SIZE;
                    fpX[i] = fpHX[i]; fpY[i] = fpHY[i];
                    fpChar[i] = Math.floor(Math.random() * PARTICLE_CHARS.length);
                    fpColor[i] = Math.floor(Math.random() * 4);
                    fpAlpha[i] = 0.2 + Math.random() * 0.4;
                    fpHighlight[i] = 0;
                    i++;
                }
            }
        }

        function buildSpatialHash() {
            spatialHash.clear();
            for (let i = 0; i < numParticles; i++) {
                const cx = (fpX[i] / HASH_SIZE) | 0;
                const cy = (fpY[i] / HASH_SIZE) | 0;
                const key = (cx << 12) | (cy & 0xFFF);
                let cell = spatialHash.get(key);
                if (!cell) { cell = []; spatialHash.set(key, cell); }
                cell.push(i);
            }
        }

        function applyWakeForce(px, py, radius, forceAmt) {
            const rSq = radius * radius;
            const minX = Math.floor((px - radius) / HASH_SIZE), maxX = Math.floor((px + radius) / HASH_SIZE);
            const minY = Math.floor((py - radius) / HASH_SIZE), maxY = Math.floor((py + radius) / HASH_SIZE);
            for (let x = minX; x <= maxX; x++) {
                for (let y = minY; y <= maxY; y++) {
                    const key = (x << 12) | (y & 0xFFF);
                    const indices = spatialHash.get(key);
                    if (!indices) continue;
                    for (let i = 0; i < indices.length; i++) {
                        const idx = indices[i];
                        const dx = fpX[idx] - px, dy = fpY[idx] - py;
                        const dSq = dx * dx + dy * dy;
                        if (dSq < rSq && dSq > 0.1) {
                            const dist = Math.sqrt(dSq);
                            const force = (1 - dist / radius) * forceAmt;
                            fpVX[idx] += (dx / dist) * force; fpVY[idx] += (dy / dist) * force;
                        }
                    }
                }
            }
        }

        function getExhaustColor(life) {
            let r, g, b;
            if (life > 0.6) {
                const t = (life - 0.6) / 0.4;
                r = 255;
                g = Math.floor(102 + t * (255 - 102));
                b = Math.floor(0 + t * (255 - 0));
            } else {
                const t = Math.max(0, life) / 0.6;
                r = Math.floor(0 + t * (255 - 0));
                g = Math.floor(68 + t * (102 - 68));
                b = Math.floor(255 + t * (0 - 255));
            }
            return `rgb(${r},${g},${b})`;
        }

        function getGuardianFlameColor(life) {
            if (life > 0.66) return '#ffdd00';
            if (life > 0.33) return '#e38914';
            return '#e01926';
        }

        function resetGame() {
            teardownBossCinematic();
            score = 0;
            WaveManager.currentWave = 0;
            WaveManager.waveDelay = 0;
            enemies = []; boss = null; enemyBullets = []; comboProjectiles = [];
            drops = []; debris = []; xpOrbs = []; thrusterParticles = [];
            deathTimer = 0; launchTimer = 0; playerExploded = false;
            shake = 0; wobble = 0;
            levelUpState = 'OFFERING'; offeredOptions = []; selectedOptionIndex = 0;
            player.x = width / 2; player.y = height * 0.8;
            player.vx = 0; player.vy = 0;
            player.hp = 100; player.maxHp = 100;
            player.xp = 0; player.xpNeeded = 10; player.level = 1;
            player.stats = { L: 1, M: 0, B: 0 };
            player.modifiers = { moveSpeed: 0, maxHp: 0, laserDamage: 0, hitbox: 1, fireRate: 0, hpRegen: 0, invincibility: 0, adrenaline: 0, magnet: 0, bombCooldown: 1 };
            player.weaponStats = { damageMult: 1, fireRateMult: 1, speedMult: 1, sizeMult: 1, pierceCount: 0, splashRadius: 0, splashDamagePercent: 0, homing: false, chainCount: 0, pathFunction: 'straight', mode: 'projectile', hasRearFire: false, hasOrbitalDrones: false, pelletCount: 1, spreadAngle: 0, inaccuracy: 0 };
            player.weapons = [];
            weaponWeights = {};
            WEAPON_POOL.forEach(w => weaponWeights[w.name] = 1.0);
            player.drones = [{angle: 0, timer: 0}, {angle: Math.PI, timer: 0}];
            player.isBeaming = false; player.rearFireTicker = 0;
            player.bombTimer = 0; player.bombCooldown = 10;
            player.invincibilityTimer = 0; player.flashTimer = 0;
            player.fireRate = 260; player.lastFire = 0; player.color = '#00ffff';
            stopMusic();
            gainNode.gain.value = isMuted ? 0 : currentVolume;
            pauseState = 'MAIN'; pauseSelection = 0;
            titleAlpha = 0; autoLaunch = true;
            gameState = 'START';
        }

        function updatePhysics(dt) {
            if (window.innerHeight < 500 || window.innerWidth < 350) return;
            if (gameState === 'LEVELUP') return;

            if (gameState === 'START') {
                if (titleAlpha < 1.0) {
                    titleAlpha = Math.min(1.0, titleAlpha + dt * 0.75);
                    if (autoLaunch && titleAlpha >= 1.0) {
                        gameState = 'LAUNCHING';
                        launchTimer = 0;
                        player.x = width / 2;
                        player.y = height + 100;
                        startMusic();
                        autoLaunch = false;
                    }
                }
                return;
            }

            if (gameState === 'LAUNCHING') {
                launchTimer += dt;
                let t = Math.min(launchTimer / 1.5, 1.0);
                // Ease out cubic
                let easeT = 1 - Math.pow(1 - t, 3);

                // Background Matrix Physics keeps going
                for (let i = 0; i < numParticles; i++) {
                    fpHY[i] += SCROLL_SPEED * dt;
                    if (fpHY[i] > height + CELL_SIZE) {
                        fpHY[i] -= (height + CELL_SIZE * 2); fpY[i] = fpHY[i]; fpX[i] = fpHX[i];
                    }
                    fpVX[i] += (fpHX[i] - fpX[i]) * SPRING_CONST; fpVY[i] += (fpHY[i] - fpY[i]) * SPRING_CONST;
                    fpVX[i] *= DAMPING; fpVY[i] *= DAMPING;
                    fpX[i] += fpVX[i]; fpY[i] += fpVY[i];
                    
                    fpHighlight[i] *= 0.98;
                }

                player.y = (height + 100) + easeT * ((height * 0.8) - (height + 100));

                if (Math.random() > 0.3) {
                    const thrusterAnchors = getPlayerThrusterAnchors(getPlayerRenderLayout(player));
                    thrusterAnchors.forEach(anchor => {
                        thrusterParticles.push({ 
                            x: anchor.x + (Math.random()-0.5)*5, y: anchor.y, 
                            vx: (Math.random()-0.5)*40, vy: 280 + Math.random()*120, 
                            char: ['^', '*', '.', 'v'][Math.floor(Math.random()*4)], 
                            color: null,
                            life: 1.0, isSmoke: false 
                        });
                    });
                }
                
                for (let i = thrusterParticles.length - 1; i >= 0; i--) {
                    const t = thrusterParticles[i]; 
                    t.x += t.vx * dt; t.y += t.vy * dt; 
                    t.life -= dt * (t.isSmoke ? 1.0 : (t.isGuardianFlame ? 2.0 : 2.8));
                    if (!t.isSmoke && !t.isGuardianFlame) applyWakeForce(t.x, t.y, 30, 1.4); 
                    if (t.life <= 0) thrusterParticles.splice(i, 1);
                }

                if (t >= 1.0) {
                    gameState = 'PLAYING';
                    player.y = height * 0.8;
                }
                return;
            }

            if (gameState === 'DYING') {
                deathTimer += dt;
                if (deathTimer > 1.0 && !playerExploded) {
                    playerExploded = true;
                    const layout = getPlayerRenderLayout(player);
                    forEachPlayerDebrisPiece(layout, piece => {
                        const ox = piece.x - player.x;
                        const oy = piece.y - player.y;
                        debris.push({
                            x: piece.x,
                            y: piece.y,
                            vx: ox * (3 + Math.random() * 4) + (Math.random() - 0.5) * 200,
                            vy: oy * (3 + Math.random() * 4) + (Math.random() - 0.5) * 200,
                            char: piece.char,
                            color: player.color,
                            life: 2.0
                        });
                    });
                    addShake(30);
                }
                if (deathTimer > 3.0 && gameState !== 'GAMEOVER') {
                    gameState = 'GAMEOVER';
                    currentHint = RAGE_HINTS[Math.floor(Math.random() * RAGE_HINTS.length)];
                }
                // Update debris only
                for (let i = debris.length - 1; i >= 0; i--) { 
                    const d = debris[i]; d.x += d.vx * dt; d.y += d.vy * dt; d.vx *= 0.98; d.vy *= 0.98; d.life -= dt * 0.9; 
                    if (d.life <= 0) debris.splice(i, 1); 
                }
                shake *= 0.88;
                if (deathTimer > 1.5) shake = 0;
                return; // Freeze everything else
            }

            if (gameState !== 'PLAYING') return;

            // Background Matrix Physics

            for (let i = 0; i < numParticles; i++) {
                fpHY[i] += SCROLL_SPEED * dt;
                if (fpHY[i] > height + CELL_SIZE) {
                    fpHY[i] -= (height + CELL_SIZE * 2); fpY[i] = fpHY[i]; fpX[i] = fpHX[i];
                }
                fpVX[i] += (fpHX[i] - fpX[i]) * SPRING_CONST; fpVY[i] += (fpHY[i] - fpY[i]) * SPRING_CONST;
                fpVX[i] *= DAMPING; fpVY[i] *= DAMPING;
                fpX[i] += fpVX[i]; fpY[i] += fpVY[i];
                
                fpHighlight[i] *= 0.98;
            }

            // Player Physics & Firing
