            const wrapperClasses = ['hud-meter-bar'];
            if (effectClass) wrapperClasses.push(effectClass);
            for (let i = 0; i < totalBlocks; i++) {
                const isFilled = i < clampedFilled;
                const ratio = totalBlocks <= 1 ? 1 : i / (totalBlocks - 1);
                const color = isFilled ? mixColor(fillStart, fillEnd, ratio) : emptyColor;
                const glow = glowEnabled && isFilled && glowAlpha > 0
                    ? `0 0 ${glowBlur}px ${colorWithAlpha(color, glowAlpha)}`
                    : 'none';
                const blockClasses = ['hud-bar-block'];
                if (isFilled) blockClasses.push('hud-bar-block-filled');
                html += `<span class="${blockClasses.join(' ')}" style="color:${color}; text-shadow:${glow}; --bar-idx:${i};">${isFilled ? '█' : '░'}</span>`;
            }
            return `<span class="${wrapperClasses.join(' ')}" style="--fill-alpha:${Math.max(0, Math.min(1, glowAlpha)).toFixed(2)};">${html}</span>`;
        }

        let hudUpdateTimer = 0;
        let lastHudSignature = '';
        function updateHud() {
            if (window.innerHeight < 500 || window.innerWidth < 350) { hud.style.display = 'none'; return; }
            if (gameState === 'START' || gameState === 'GAMEOVER') { hud.style.opacity = 0; return; }
            
            hud.style.display = 'flex';
            if (gameState === 'LAUNCHING') {
                let t = Math.min(launchTimer / 1.5, 1.0);
                hud.style.opacity = 1 - Math.pow(1 - t, 3);
            } else {
                hud.style.opacity = 1;
            }

            hudUpdateTimer--;
            if (hudUpdateTimer > 0) return;
            hudUpdateTimer = 6; // Update at ~10Hz
            
            const hpRatio = Math.max(0, Math.min(1, player.hp / player.maxHp));
            let hpColor = '#00ff44';
            if (hpRatio < 0.3) hpColor = '#cc0000';
            else if (hpRatio <= 0.6) hpColor = '#ff8800';
            const hpBlocks = Math.ceil(hpRatio * HUD_BAR_BLOCKS);
            const hpBar = buildMeterBar(hpBlocks, HUD_BAR_BLOCKS, hpColor, hpColor, '#202020', {
                effectClass: 'is-hp',
                glowAlpha: hpRatio * 0.8,
                glowBlur: 8
            });
            
            const xpRatio = Math.max(0, Math.min(1, player.xp / player.xpNeeded));
            const xpPerc = Math.min(HUD_BAR_BLOCKS, Math.floor(xpRatio * HUD_BAR_BLOCKS));
            const xpBar = buildMeterBar(xpPerc, HUD_BAR_BLOCKS, '#d2d2d2', '#8f8f8f', '#252525', {
                effectClass: 'is-xp',
                glowAlpha: xpRatio,
                glowBlur: 10
            });

            const bombCooldownTotal = Math.max(0.001, player.bombCooldown * player.modifiers.bombCooldown);
            const bombRatio = Math.max(0, Math.min(1, 1 - (Math.max(0, player.bombTimer) / bombCooldownTotal)));
            const bombBlocks = Math.ceil(bombRatio * HUD_BAR_BLOCKS);
            const bombReady = bombRatio >= 0.999;
            const bombBar = buildMeterBar(bombBlocks, HUD_BAR_BLOCKS, '#1e3da8', '#d12ad6', '#27328f', {
                effectClass: bombReady ? 'is-bomb-ready' : '',
                glowAlpha: bombReady ? 1 : bombRatio * 0.55,
                glowBlur: bombReady ? 12 : 8
            });
            
            const waveText = boss ? 'BOSS' : WaveManager.currentWave;
            const sep = `<span class="hud-sep">◆</span>`;
            const weaponSignature = player.weapons.map(w => `${w.name}:${w.color}:${w.glyph}`).join('|');
            const hudSignature = [
                score,
                hpBlocks,
                hpColor,
                Math.round(hpRatio * 100),
                xpPerc,
                Math.round(xpRatio * 100),
                bombBlocks,
                bombReady ? 1 : 0,
                waveText,
                player.level,
                currentThemeColor,
                glowEnabled ? 1 : 0,
                weaponSignature
            ].join('~');
            if (hudSignature === lastHudSignature) return;
            lastHudSignature = hudSignature;

            let gridHtml = `<div class="hud-weapon-grid" style="box-shadow:inset 0 0 10px ${currentThemeColor}22;">`;
            for (let i = 0; i < 10; i++) {
                if (i < player.weapons.length) {
                    const w = player.weapons[i];
                    const wGlow = glowEnabled ? `text-shadow:0 0 5px ${w.color};` : '';
                    gridHtml += `<div class="hud-weapon-cell" style="color:${w.color}; ${wGlow}">${w.glyph}</div>`;
                } else {
                    gridHtml += `<div class="hud-weapon-cell" style="background:rgba(255,255,255,0.1);"></div>`;
                }
            }
            gridHtml += `</div>`;

            hud.innerHTML = `
                <div class="hud-left">
                    <div class="hud-score">
                        <span class="hud-score-label">SCORE</span>
                        <span class="hud-score-value">${score.toString().padStart(6, '0')}</span>
                    </div>
                    <div class="hud-meters">
                        <div class="hud-meter">
                            <span class="hud-meter-label">HP</span>
                            ${hpBar}
                        </div>
                        <div class="hud-meter">
                            <span class="hud-meter-label">XP</span>
                            ${xpBar}
                        </div>
                        <div class="hud-meter">
                            <span class="hud-meter-label">BOMB</span>
                            ${bombBar}
                        </div>
                    </div>
                </div>
                <div class="hud-right">
                    <div class="hud-weapon-wrap">${gridHtml}</div>
                    <div class="hud-status">
                        <span>LVL ${player.level}</span>
                        ${sep}
                        <span>WAVE ${waveText}</span>
                    </div>
                </div>`;
        }

        function gameLoop(now) {
            if (bossCinematic && bossCinematic.paused) {
                lastTime = now;
                lastRafTime = now;
                frameCount++;
                if (now >= fpsLastTime + 1000) {
                    currentFps = frameCount;
                    frameCount = 0;
                    fpsLastTime = now;
                    fpsElement.innerText = `FPS: ${currentFps}`;
                }
                updateBossCinematic(now);
                requestAnimationFrame(gameLoop);
                return;
            }

            if (fpsCapped || userFpsCap) {
                if (now - lastRafTime < 16.6) {
                    requestAnimationFrame(gameLoop);
                    return;
                }
                lastRafTime = now - ((now - lastRafTime) % 16.6);
            }
            
            let dt = Math.min((now - lastTime) / 1000, 0.05); 
            lastTime = now;
            
            if ((gameState === 'PLAYING' || gameState === 'LAUNCHING') && benchFrames < 120) {
                if (benchFrames === 0) benchStartTime = now;
                benchFrames++;
                if (benchFrames === 120) {
                    if ((120 / (now - benchStartTime)) * 1000 < 58) {
                        fpsCapped = true;
                        fpsLowPerf.style.display = 'block';
                    }
                }
            }

            // FPS Counter update
            frameCount++;
            if (now >= fpsLastTime + 1000) {
                currentFps = frameCount;
                frameCount = 0;
                fpsLastTime = now;
                fpsElement.innerText = `FPS: ${currentFps}`;
            }

            buildSpatialHash(); updatePhysics(dt); draw(dt); updateHud();
            if (bossCinematic) updateBossCinematic(now);
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('resize', resize); resize();
        document.fonts.ready.then(() => { resize(); requestAnimationFrame(gameLoop); });
    </script>
</body>
</html>
